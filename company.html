<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prometheus</title>
 //fonts.googleapis.com">
  //fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/percent.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Dark.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="i18n.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surface:#161b22; --surface2:#21262d;
      --border:#30363d; --text:#e6edf3; --text-muted:#8b949e;
      --accent:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#d29922; --purple:#bc8cff; --glow:rgba(88,166,255,0.04);
      --nav-h:48px; --side-w:48px;
    }
    html[data-theme="light"] {
      --bg:#f8fafc; --surface:#ffffff; --surface2:#f1f5f9;
      --border:#e2e8f0; --text:#0f172a; --text-muted:#64748b;
      --accent:#2563eb; --green:#16a34a; --red:#dc2626;
      --yellow:#d97706; --purple:#7c3aed; --glow:rgba(37,99,235,0.03);
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .stagger { animation:fadeUp 0.35s ease both; animation-delay:calc(var(--i,0)*0.05s); }

    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

    /* NAV */
    nav { position:sticky; top:0; z-index:200; height:var(--nav-h); background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
    .nav-left  { display:flex; align-items:center; gap:14px; }
    .nav-right { display:flex; align-items:center; gap:8px; }
    .nav-brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; color:var(--text); text-decoration:none; letter-spacing:-0.3px; }
    .nav-brand svg { color:var(--accent); }
    .back-btn  { display:flex; align-items:center; gap:5px; color:var(--text-muted); text-decoration:none; font-size:13px; transition:color 0.2s; }
    .back-btn:hover { color:var(--text); }
    .back-sep  { color:var(--border); font-size:16px; }
    .nav-ticker { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--accent); }
    .lang-btn  { background:none; border:1px solid var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer; height:30px; padding:0 8px; font-size:12px; transition:border-color 0.2s,color 0.2s; }
    .lang-btn:hover { border-color:var(--accent); color:var(--accent); }
    .theme-toggle { background:none; border:1px solid var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:14px; transition:border-color 0.2s,color 0.2s; }
    .theme-toggle:hover { border-color:var(--accent); color:var(--accent); }

    /* PAGE SHELL */
    .page-shell { display:flex; min-height:calc(100vh - var(--nav-h)); }

    /* SIDE NAV */
    .side-nav { position:sticky; top:var(--nav-h); height:calc(100vh - var(--nav-h)); width:var(--side-w); flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding:16px 0; gap:4px; border-right:1px solid var(--border); background:var(--bg); z-index:100; overflow-y:auto; }
    .sn-btn { position:relative; width:36px; height:36px; border-radius:8px; border:none; background:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; transition:background 0.15s,color 0.15s; flex-shrink:0; }
    .sn-btn:hover  { background:var(--surface2); color:var(--text); }
    .sn-btn.active { background:var(--surface2); color:var(--accent); }
    .sn-btn.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:2px; height:18px; background:var(--accent); border-radius:0 2px 2px 0; }
    .sn-btn::after { content:attr(data-tip); position:absolute; left:calc(100% + 10px); top:50%; transform:translateY(-50%); background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:-apple-system,sans-serif; font-size:11px; font-weight:500; padding:4px 8px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.15s; z-index:999; }
    .sn-btn:hover::after { opacity:1; }
    .sn-divider { width:20px; height:1px; background:var(--border); margin:4px 0; flex-shrink:0; }

    /* MAIN CONTENT */
    .main-content { flex:1; min-width:0; padding:28px 28px 80px; }

    /* COMPANY HEADER */
    .company-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
    .company-logo-lg { width:52px; height:52px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:800; color:var(--accent); flex-shrink:0; letter-spacing:-1px; }
    .company-info  { flex:1; }
    .company-title { font-size:20px; font-weight:800; margin-bottom:6px; letter-spacing:-0.5px; }
    .company-meta  { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .meta-tag   { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }
    .meta-muted { color:var(--text-muted); font-size:12px; font-family:'JetBrains Mono',monospace; }
    .company-desc { color:var(--text-muted); font-size:13px; margin-top:8px; line-height:1.65; max-width:680px; }

    /* STAT STRIP */
    .stat-strip { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:28px; }
    .stat-item  { flex:1; padding:12px 16px; border-right:1px solid var(--border); }
    .stat-item:last-child { border-right:none; }
    .stat-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:4px; }
    .stat-value { font-size:20px; font-weight:800; line-height:1; font-family:'JetBrains Mono',monospace; }
    .stat-sub   { font-size:10px; color:var(--text-muted); margin-top:3px; }

    /* SECTION */
    .section-anchor { display:block; height:1px; margin-top:-68px; padding-top:68px; visibility:hidden; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }
    .section-title  { font-size:12px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
    .section-badge  { background:var(--surface2); border:1px solid var(--border); border-radius:20px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); padding:2px 8px; }
    .content-section { margin-bottom:56px; }

    /* OVERVIEW SUB */
    .ov-section { margin-bottom:24px; }
    .ov-title { font-size:11px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; padding-bottom:8px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }

    /* SNAPSHOT */
    .snapshot-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; }
    .snap-card  { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
    .snap-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); margin-bottom:5px; letter-spacing:0.3px; text-transform:uppercase; }
    .snap-value { font-size:13px; font-weight:600; line-height:1.4; }

    /* MOAT */
    .moat-list { display:flex; flex-wrap:wrap; gap:6px; }
    .moat-chip { background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text-muted); font-size:12px; padding:5px 10px; line-height:1.4; }

    /* SEGMENTS */
    .seg-layout { display:grid; grid-template-columns:1fr 180px; gap:20px; align-items:start; }
    @media(max-width:640px){ .seg-layout { grid-template-columns:1fr; } }
    .seg-bar-item   { margin-bottom:12px; }
    .seg-bar-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; font-size:12px; }
    .seg-bar-name   { font-weight:600; }
    .seg-bar-nums   { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); }
    .seg-bar-track  { background:var(--surface2); border-radius:3px; height:6px; overflow:hidden; }
    .seg-bar-fill   { height:100%; border-radius:3px; width:0; transition:width 0.8s ease; }
    .seg-bar-assets { font-size:11px; color:var(--text-muted); margin-top:3px; }
    .seg-donut-wrap { display:flex; flex-direction:column; align-items:center; }
    .seg-donut-canvas { width:168px; height:168px; }

    /* GEO */
    .geo-item   { margin-bottom:10px; }
    .geo-header { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
    .geo-track  { background:var(--surface2); border-radius:3px; height:5px; overflow:hidden; }
    .geo-fill   { height:100%; border-radius:3px; background:var(--accent); width:0; transition:width 0.8s ease; }

    /* TIMELINE */
    .tl-filters { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
    .tl-filter  { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-size:11px; padding:3px 10px; transition:all 0.2s; }
    .tl-filter:hover,.tl-filter.active { border-color:var(--accent); color:var(--accent); }
    .timeline-wrap { position:relative; padding-left:26px; }
    .timeline-wrap::before { content:''; position:absolute; left:7px; top:0; bottom:0; width:1px; background:var(--border); }
    .tl-item    { position:relative; margin-bottom:18px; }
    .tl-item.hidden { display:none; }
    .tl-dot     { position:absolute;left:-22px; top:4px; width:10px; height:10px; border-radius:50%; border:2px solid var(--bg); }
    .tl-year    { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); font-weight:700; margin-bottom:3px; }
    .tl-evtitle { font-size:14px; font-weight:700; margin-bottom:4px; }
    .tl-desc    { font-size:13px; color:var(--text-muted); line-height:1.5; }

    /* MANAGEMENT */
    .mgmt-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:12px; }
    .mgmt-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; transition:border-color 0.2s; }
    .mgmt-card:hover { border-color:var(--accent); }
    .mgmt-name  { font-size:14px; font-weight:700; margin-bottom:2px; }
    .mgmt-title { font-size:11px; color:var(--accent); font-family:'JetBrains Mono',monospace; margin-bottom:5px; }
    .mgmt-since { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; margin-bottom:7px; }
    .mgmt-bio   { font-size:12px; color:var(--text-muted); line-height:1.5; }

    /* THESIS */
    .thesis-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:640px){ .thesis-grid { grid-template-columns:1fr; } }
    .thesis-card  { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
    .thesis-label { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; margin-bottom:8px; }
    .thesis-label.bull { color:var(--green); }
    .thesis-label.bear { color:var(--red); }
    .thesis-text  { font-size:13px; color:var(--text-muted); line-height:1.6; }

    /* RISKS */
    .risk-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:8px; cursor:pointer; transition:border-color 0.2s; }
    .risk-item:hover { border-color:var(--accent); }
    .risk-header   { display:flex; align-items:center; gap:10px; }
    .risk-severity { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; white-space:nowrap; }
    .sev-high   { background:rgba(248,81,73,0.15); color:var(--red); }
    .sev-medium { background:rgba(210,153,34,0.15); color:var(--yellow); }
    .sev-low    { background:rgba(63,185,80,0.15); color:var(--green); }
    .risk-name   { font-size:13px; font-weight:600; flex:1; }
    .risk-toggle { color:var(--text-muted); font-size:11px; }
    .risk-body   { display:none; padding-top:10px; }
    .risk-body.open { display:block; }
    .risk-desc   { font-size:13px; color:var(--text-muted); line-height:1.5; margin-bottom:7px; }
    .risk-mitigation { font-size:12px; background:var(--surface2); border-radius:6px; padding:7px 10px; color:var(--text-muted); border-left:2px solid var(--green); }
    .risk-mit-label  { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--green); margin-bottom:2px; }

    /* OWNERSHIP */
    .ownership-layout { display:grid; grid-template-columns:180px 1fr; gap:20px; align-items:start; }
    @media(max-width:640px){ .ownership-layout { grid-template-columns:1fr; } }
    .own-donut-canvas { width:168px; height:168px; }
    .sh-item { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); }
    .sh-item:last-child { border-bottom:none; }
    .sh-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .sh-name { font-size:13px; flex:1; }
    .sh-type { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); }
    .sh-pct  { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:var(--accent); }

    /* ORG CHART */
    .org-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; overflow-x:auto; }
    .org-wrap svg { max-width:100%; }

    /* TAG FILTER */
    .tag-filter-bar   { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:14px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
    .tag-filter-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); white-space:nowrap; text-transform:uppercase; letter-spacing:0.5px; }
    .tag-chip         { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 9px; transition:all 0.15s; }
    .tag-chip:hover   { border-color:var(--accent); color:var(--accent); }
    .tag-chip.active  { background:rgba(88,166,255,0.15); border-color:var(--accent); color:var(--accent); font-weight:600; }
    html[data-theme="light"] .tag-chip.active { background:rgba(37,99,235,0.1); }
    .tag-chip-clear   { background:none; border:none; color:var(--red); cursor:pointer; font-size:11px; margin-left:auto; padding:2px 7px; display:none; }
    .tag-chip-clear.visible { display:inline; }
    .tag-filter-empty { font-size:13px; color:var(--text-muted); padding:20px; text-align:center; }

    /* NOTE CARDS */
    .note-card { background:var(--surface); border:1px solid var(--border); border-left:2px solid transparent; border-radius:8px; padding:18px; margin-bottom:12px; transition:border-color 0.2s; }
    .note-card:hover { border-left-color:var(--accent); }
    .note-card.hidden { display:none; }
    .note-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:10px; flex-wrap:wrap; }
    .note-title  { font-size:15px; font-weight:700; }
    .note-date   { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); white-space:nowrap; }
    .note-tags   { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
    .note-tag    { background:var(--surface2); border:1px solid transparent; border-radius:20px; color:var(--text-muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 8px; transition:all 0.15s; }
    .note-tag:hover,.note-tag.active { color:var(--accent); border-color:var(--accent); background:rgba(88,166,255,0.1); }
    .note-body   { color:var(--text-muted); font-size:13px; line-height:1.7; white-space:pre-wrap; }
    .note-rating { color:var(--yellow); font-size:13px; margin-top:8px; font-family:'JetBrains Mono',monospace; }

    /* QUOTE CARDS */
    .quote-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:16px 18px; margin-bottom:12px; }
    .quote-card.hidden { display:none; }
    .quote-meta   { display:flex; align-items:center; gap:10px; margin-bottom:9px; flex-wrap:wrap; }
    .quote-source { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--accent); }
    .quote-speaker{ color:var(--text-muted); font-size:12px; }
    .quote-date   { font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:11px; margin-left:auto; }
    .quote-text   { font-family:'Instrument Serif',serif; font-size:16px; line-height:1.7; font-style:italic; color:var(--text); }
    .quote-text::before { content:'\201C'; font-size:26px; color:var(--accent); line-height:0; vertical-align:-8px; margin-right:3px; }
    .quote-text::after  { content:'\201D'; font-size:26px; color:var(--accent); line-height:0; vertical-align:-8px; margin-left:3px; }
    .quote-th       { color:var(--text-muted); font-size:12px; line-height:1.6; margin-top:9px; padding:9px 12px; background:var(--surface2); border-radius:6px; border-left:2px solid var(--border); }
    .quote-th-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); opacity:0.7; margin-bottom:3px; }
    .quote-tag-link { background:var(--surface2); border:1px solid transparent; border-radius:20px; color:var(--text-muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 8px; display:inline-block; margin-top:8px; transition:all 0.15s; }
    .quote-tag-link:hover,.quote-tag-link.active { color:var(--accent); border-color:var(--accent); background:rgba(88,166,255,0.1); }

    /* ROADMAP */
    .roadmap-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-bottom:16px; }
    .rm-sum-card  { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; text-align:center; }
    .rm-sum-num   { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:800; margin-bottom:2px; }
    .rm-sum-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.3px; }
    .roadmap-filters { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .rm-filter { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-size:11px; padding:3px 10px; transition:all 0.2s; }
    .rm-filter:hover,.rm-filter.active { border-color:var(--accent); color:var(--accent); }
    .roadmap-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 18px; margin-bottom:10px; display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:start; transition:border-color 0.2s; }
    .roadmap-item:hover { border-color:var(--accent); }
    .rm-status-dot { width:8px; height:8px; border-radius:50%; margin-top:6px; flex-shrink:0; }
    .status-delivered  { background:var(--green); }
    .status-pending    { background:var(--yellow); }
    .status-missed     { background:var(--red); }
    .status-partial    { background:var(--purple); }
    .status-monitoring { background:var(--accent); }
    .rm-commitment { font-size:13px; font-weight:600; margin-bottom:5px; }
    .rm-source     { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); margin-bottom:7px; }
    .rm-followup   { background:var(--surface2); border-radius:6px; font-size:12px; color:var(--text-muted); padding:7px 10px; }
    .rm-followup-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent); font-weight:600; margin-bottom:2px; }
    .rm-badge { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; white-space:nowrap; }
    .badge-delivered   { background:rgba(63,185,80,0.15);color:var(--green); }
    .badge-pending    { background:rgba(210,153,34,0.15);  color:var(--yellow); }
    .badge-missed     { background:rgba(248,81,73,0.15);   color:var(--red); }
    .badge-partial    { background:rgba(188,140,255,0.15); color:var(--purple); }
    .badge-monitoring { background:rgba(88,166,255,0.15);  color:var(--accent); }

    /* GANTT */
    .gantt-section { background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:16px; overflow:hidden; }
    .gantt-title   { align-items:center; border-bottom:1px solid var(--border); display:flex; font-size:12px; font-weight:600; gap:8px; padding:10px 14px; color:var(--text-muted); }

    /* FINANCIALS */

    .fin-table th { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-weight:600; padding:9px 12px; text-align:right; }
    .fin-table th:first-child { text-align:left; }

    .fin-table tr:hover td { background:var(--surface2); }

    .fin-metric-bar   { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
    .fin-metric-btn   { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-size:11px; padding:3px 10px; transition:all 0.18s; white-space:nowrap; }
    .fin-metric-btn:hover { border-color:var(--accent); color:var(--accent); }
    .fin-metric-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    #fin-chart        { height:220px; width:100%; }
    .sankey-container { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px; margin-bottom:18px; height:440px; }
    .fin-links-grid   { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:8px; margin-bottom:4px; }
    .fin-link-card    { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); display:flex; align-items:center; gap:10px; padding:10px 12px; text-decoration:none; transition:border-color 0.2s,background 0.2s; }
    .fin-link-card:hover { background:var(--surface); border-color:var(--accent); }
    .fin-link-icon    { align-items:center; border-radius:6px; display:flex; flex-shrink:0; font-size:16px; height:30px; justify-content:center; width:30px; }
    .fin-link-icon.type-10k    { background:rgba(88,166,255,0.15); }
    .fin-link-icon.type-10q    { background:rgba(63,185,80,0.15); }
    .fin-link-icon.type-annual { background:rgba(210,153,34,0.15); }
    .fin-link-icon.type-other  { background:rgba(139,148,158,0.15); }
    .fin-link-info    { flex:1; min-width:0; }
    .fin-link-title   { font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fin-link-type    { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); margin-top:2px; }
    .fin-link-arrow   { color:var(--text-muted); font-size:13px; }

    /* TRADINGVIEW */
    .tv-section   { margin-bottom:24px; }
    .tv-chart-wrap { height:460px; border-radius:8px; overflow:hidden; border:1px solid var(--border); background:var(--surface); }
    .tv-fund-wrap  { height:540px; border-radius:8px; overflow:hidden; border:1px solid var(--border); background:var(--surface); }

    /* SECTOR */
    .sector-tech     { background:rgba(88,166,255,0.15);  color:#58a6ff; }
    .sector-finance  { background:rgba(63,185,80,0.15);   color:#3fb950; }
    .sector-health   { background:rgba(248,81,73,0.15);   color:#f85149; }
    .sector-energy   { background:rgba(210,153,34,0.15);  color:#d29922; }
    .sector-consumer { background:rgba(188,140,255,0.15); color:#bc8cff; }
    .sector-other    { background:rgba(139,148,158,0.15); color:#8b949e; }

    /* MISC */
    .empty   { text-align:center; padding:40px; color:var(--text-muted); font-size:13px; }
    .loading { text-align:center; padding:60px; color:var(--text-muted); }

    /* MOBILE */
    @media(max-width:600px){
      :root { --side-w:40px; }
      .main-content { padding:16px 14px 60px; }
      .stat-strip { flex-wrap:wrap; }
      .stat-item  { flex:1 1 45%; }
      .sn-btn::after { display:none; }
    }
  </style>
</head>

<script>
/* ── THEME & LANG INIT ── */
(function(){
  const th = localStorage.getItem('prometheus-theme')||'dark';
  document.documentElement.setAttribute('data-theme',th);
  document.getElementById('theme-btn').textContent = th==='dark'?'🌙':'☀️';
})();

window.toggleTheme = function(){
  const cur = document.documentElement.getAttribute('data-theme');
  const nxt = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',nxt);
  localStorage.setItem('prometheus-theme',nxt);
  document.getElementById('theme-btn').textContent = nxt==='dark'?'🌙':'☀️';
  if(companyData?.financials){ setTimeout(()=>{ drawFinChart(companyData.financials); drawSankeyChart(companyData.financials); },50); }
  if(companyData?.overview){
    setTimeout(()=>{
      drawSegmentDonut(companyData.overview.segments||[]);
      drawOwnershipDonut(companyData.overview.ownership?.major_shareholders||[]);
      renderTVChart(companyData.tradingview_symbol);
    },50);
  }
  setTimeout(()=>renderTVFundamentals(companyData?.tradingview_symbol),150);
};

window.toggleLang = function(){
  const cur = window.currentLang||'th';
  const nxt = cur==='th'?'en':'th';
  if(window.setLang) setLang(nxt);
  document.getElementById('lang-btn').textContent = nxt==='th'?'🇹🇭':'🇺🇸';
  if(companyData) render();
};

mermaid.initialize({ startOnLoad:false, theme:'dark', securityLevel:'loose' });

const params  = new URLSearchParams(window.location.search);
const ticker  = params.get('ticker');
let companyData      = null;
let rmFilter         = 'all';
let activeNoteTag    = null;
let activeQuoteTag   = null;

document.getElementById('nav-ticker').textContent = ticker||'—';

const SECTOR_CLASS = { Technology:'sector-tech', Finance:'sector-finance', Healthcare:'sector-health', Energy:'sector-energy', Consumer:'sector-consumer' };
function getStatusLabel(s){ return t('status.'+s)||s; }
const LINK_ICONS = {
  '10-K':{icon:'📄',cls:'type-10k'}, '10-Q':{icon:'📋',cls:'type-10q'},
  'Annual Report':{icon:'📑',cls:'type-annual'}, 'Proxy Statement':{icon:'🗳️',cls:'type-other'}, 'Investor Day':{icon:'🎤',cls:'type-other'}
};
const SEG_TYPE_COLOR = { gold:'#d29922',copper:'#e3663a',silver:'#9eaab7',software:'#58a6ff',hardware:'#bc8cff',services:'#3fb950',cloud:'#58d68d',energy:'#ff9900',other:'#8b949e' };
const TL_TYPE_COLOR  = { founding:'#58a6ff',merger:'#bc8cff',milestone:'#d29922',project:'#3fb950',financial:'#58d68d',crisis:'#f85149',product:'#e3663a' };
const OWN_COLORS     = ['#58a6ff','#3fb950','#d29922','#bc8cff','#e3663a','#9eaab7','#58d68d','#f85149'];

function formatDate(d){ if(!d)return'—'; const loc=window.currentLang==='en'?'en-US':'th-TH'; return new Date(d).toLocaleDateString(loc,{day:'numeric',month:'short',year:'numeric'}); }

/* ── LOAD ── */
async function loadCompany(){
  if(!ticker){ document.getElementById('main').innerHTML='<div class="error">ไม่พบ ticker ในลิงก์</div>'; return; }
  try{
    const res = await fetch(`data/${ticker}/data.json`);
    if(!res.ok) throw new Error('not found');
    companyData = await res.json();
    document.title = `${companyData.name} — Prometheus`;
    render();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="error">ไม่พบข้อมูล ${ticker}<br><small>ตรวจสอบว่ามีไฟล์ data/${ticker}/data.json</small></div>`;
  }
}

/* ── HELPERS ── */
function collectTags(items,field){
  const set=new Set();
  items.forEach(i=>{ const v=i[field]; if(Array.isArray(v))v.forEach(x=>set.add(x)); else if(v)set.add(v); });
  return [...set].sort();
}
function tagFilterBar(tags,activeTag,onClickFn,clearFn){
  if(!tags.length)return'';
  const chips=tags.map(tg=>`<button class="tag-chip ${activeTag===tg?'active':''}" onclick="${onClickFn}('${tg}')">#${tg}`</button>`).join('');
  return `<div class="tag-filter-bar"><span class="tag-filter-label">TAG</span>${chips}<button class="tag-chip-clear ${activeTag?'visible':''}" onclick="${clearFn}()">✕ clear</button></div>`;
}

/* ── SEGMENT / GEO ENRICH ── */
function parsePct(str){
  if(str==null)return null;
  const s=String(str).replace(/,/g,'');
  const isLT=s.includes('<');
  const m=s.match(/(\d+(?:\.\d+)?)\s*%/);
  if(!m)return null;
  const v=parseFloat(m[1]);
  return isLT?Math.round(v*0.5*10)/10:v;
}
function enrichSegments(segs){
  let totalRevB=null;
  const fin=companyData?.financials;
  if(fin?.metrics&&fin?.years){
    const rm=fin.metrics.find(m=>m.name==='Revenue');
    if(rm){ for(let i=rm.values.length-1;i>=0;i--){ if(rm.values[i]!=null){ const div=(!fin.unit||fin.unit.toLowerCase().includes('billion'))?1:1000; totalRevB=Math.round(rm.values[i]/div*10)/10; break; } } }
  }
  return segs.map(s=>{
    if(s.revenue!=null&&s.revenue_pct!=null)return s;
    const pct=s.revenue_pct??parsePct(s.revenue_share);
    const rev=(totalRevB!=null&&pct!=null)?Math.round(totalRevB*pct/100*10)/10:s.revenue??null;
    return{...s,revenue_pct:pct,revenue:rev};
  });
}
function enrichGeos(geos){
  return geos.map(g=>{ if(g.revenue_pct!=null)return g; return{...g,revenue_pct:parsePct(g.share??g.revenue_share)}; });
}

/* ── RENDER ── */
function render(){
  const c=companyData;
  const sectorClass=SECTOR_CLASS[c.sector]||'sector-other';
  const notes=c.notes||[];
  const quotes=c.quotes||[];
  const roadmap=c.roadmap||[];
  const fin=c.financials||{};
  const ov=c.overview||null;
  if(ov?.segments?.length) ov.segments=enrichSegments(ov.segments);
  if(ov?.geographies?.length) ov.geographies=enrichGeos(ov.geographies);
  const rmStats={
    delivered:roadmap.filter(r=>r.status==='delivered').length,
    pending:  roadmap.filter(r=>r.status==='pending').length,
    missed:   roadmap.filter(r=>r.status==='missed').length,
    partial:  roadmap.filter(r=>r.status==='partial').length,
  };
  const concluded=rmStats.delivered+rmStats.missed+rmStats.partial;
  const deliveryRate=concluded>0?Math.round(rmStats.delivered/concluded*100):0;
  const drColor=deliveryRate>=70?'var(--green)':deliveryRate>=40?'var(--yellow)':'var(--red)';

  document.getElementById('main').innerHTML=`
    <div class="company-header stagger" style="--i:0">
      <div class="company-logo-lg">${ticker.slice(0,3)}</div>
      <div class="company-info">
        <div class="company-title">${c.name}</div>
        <div class="company-meta">
          <span class="meta-tag ${sectorClass}">${c.sector}</span>
          <span class="meta-muted">${ticker} · ${c.exchange||'NASDAQ'}</span>
          <span class="meta-muted">· ${t('company.updated')} ${formatDate(c.last_updated)}</span>
        </div>
        ${c.description?`<div class="company-desc">${c.description}</div>`:''}
      </div>
    </div>

    <div class="stat-strip stagger" style="--i:1">
      <div class="stat-item"><div class="stat-label">NOTES</div><div class="stat-value">${notes.length}</div><div class="stat-sub">${t('qs.notes_sub')}</div></div>
      <div class="stat-item"><div class="stat-label">QUOTES</div><div class="stat-value">${quotes.length}</div><div class="stat-sub">${t('qs.quotes_sub')}</div></div>
      <div class="stat-item"><div class="stat-label">ROADMAP</div><div class="stat-value">${roadmap.length}</div><div class="stat-sub">${t('qs.roadmap_sub')}</div></div>
      <div class="stat-item"><div class="stat-label">DELIVERY</div><div class="stat-value" style="color:${drColor}">${concluded>0?deliveryRate+'%':'—'}</div><div class="stat-sub">${concluded>0?concluded+' '+t('qs.delivery_concluded'):t('qs.delivery_none')}</div></div>
    </div>

    <span class="section-anchor" id="anchor-overview"></span>
    <div class="content-section" id="section-overview">
      <div class="section-header">
        <div class="section-title">📊 ${t('tab.overview')}</div>
      </div>
      ${renderOverviewPanel(ov)}
    </div>

    <span class="section-anchor" id="anchor-notes"></span>
    <div class="content-section" id="section-notes">
      <div class="section-header">
        <div class="section-title">📝 ${t('tab.notes')}</div>
        <span class="section-badge">${notes.length}</span>
      </div>
      ${renderNotesPanel(notes)}
    </div>

    <span class="section-anchor" id="anchor-quotes"></span>
    <div class="content-section" id="section-quotes">
      <div class="section-header">
        <div class="section-title">💬 ${t('tab.quotes')}</div>
        <span class="section-badge">${quotes.length}</span>
      </div>
      ${renderQuotesPanel(quotes)}
    </div>

    <span class="section-anchor" id="anchor-roadmap"></span>
    <div class="content-section" id="section-roadmap">
      <div class="section-header">
        <div class="section-title">🗺️ ${t('tab.roadmap')}</div>
        <span class="section-badge">${roadmap.length}</span>
      </div>
      ${renderRoadmapPanel(roadmap,rmStats)}
    </div>

    <span class="section-anchor" id="anchor-financials"></span>
    <div class="content-section" id="section-financials">
      <div class="section-header">
        <div class="section-title">💰 ${t('tab.financials')}</div>
      </div>
      ${renderFinancials(fin)}
    </div>
  `;

  if(fin.metrics&&fin.years)       setTimeout(()=>drawFinChart(fin),100);
  if(fin.breakdown?.sankey)        setTimeout(()=>drawSankeyChart(fin),150);
  if(roadmap.length)               setTimeout(()=>renderGanttChart(roadmap),200);
  if(ov?.segments?.length)         setTimeout(()=>drawSegmentDonut(ov.segments),120);
  if(ov?.ownership?.major_shareholders?.length) setTimeout(()=>drawOwnershipDonut(ov.ownership.major_shareholders),130);
  if(ov?.ownership?.corporate_structure?.length) setTimeout(()=>renderOrgChart(ov.ownership.corporate_structure),250);
  setTimeout(()=>animateBars(),150);
  if(c.tradingview_symbol)         setTimeout(()=>renderTVChart(c.tradingview_symbol),300);
  if(c.tradingview_symbol)         setTimeout(()=>renderTVFundamentals(c.tradingview_symbol),350);
  initScrollSpy();
}

/* ── SCROLL SPY ── */
function initScrollSpy(){
  const sections=['overview','notes','quotes','roadmap','financials'];
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace('section-','');
        document.querySelectorAll('.sn-btn').forEach(b=>{
          b.classList.toggle('active',b.dataset.section===id);
        });
      }
    });
  },{rootMargin:'-40% 0px -55% 0px'});
  sections.forEach(s=>{ const el=document.getElementById('section-'+s); if(el)observer.observe(el); });
}

window.scrollToSection=function(id){
  const el=document.getElementById('anchor-'+id);
  if(el) el.scrollIntoView({behavior:'smooth'});
};

/* ── OVERVIEW PANEL ── */
function renderOverviewPanel(ov){
  if(!ov){
    const c=companyData||{};
    const fin=c.financials||{};
    const rev=(fin.metrics||[]).find(m=>m.name==='Revenue');
    const ni=(fin.metrics||[]).find(m=>m.name==='Net Income');
    const latestRev=rev?.values?.slice(-1)[0];
    const latestNI=ni?.values?.slice(-1)[0];
    const latestYr=(fin.years||[]).slice(-1)[0]||'';
    return `
      ${c.description?`<div class="ov-section"><div class="ov-title">${t('ov.about')}</div><div style="font-size:13px;color:var(--text-muted);line-height:1.7">${c.description}</div></div>`:''}
      ${latestRev!=null?`<div class="ov-section"><div class="ov-title">${t('ov.latest_fin')} (FY${latestYr})</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">
        ${latestRev!=null?`<div class="snap-card"><div class="snap-label">Revenue</div><div class="snap-value">${fin.currency||'USD'} ${latestRev.toLocaleString()} ${fin.unit||''}</div></div>`:''}
        ${latestNI!=null?`<div class="snap-card"><div class="snap-label">Net Income</div><div class="snap-value" style="color:${latestNI>=0?'var(--green)':'var(--red)'}">${fin.currency||'USD'} ${latestNI.toLocaleString()} ${fin.unit||''}</div></div>`:''}
      </div></div>`:''}
      <div class="ov-section" style="border:1px dashed var(--border);border-radius:8px;padding:16px;text-align:center;color:var(--text-muted);font-size:12px">${t('ov.empty_notice')}</div>
    `;
  }
  const tvSymbol=companyData?.tradingview_symbol;
  const tvHtml=tvSymbol?`<div class="tv-section"><div class="ov-title">${t('ov.stock_price')}</div><div class="tv-chart-wrap" id="tv-chart-outer"></div></div>`:'';
  const snapshotHtml=`<div class="ov-section"><div class="ov-title">${t('ov.company_info')}</div><div class="snapshot-grid">
    ${ov.founded?`<div class="snap-card"><div class="snap-label">${t('snap.founded')}</div><div class="snap-value">${ov.founded}</div></div>`:''}
    ${ov.headquarters?`<div class="snap-card"><div class="snap-label">${t('snap.hq')}</div><div class="snap-value">${ov.headquarters}</div></div>`:''}
    ${ov.employees?`<div class="snap-card"><div class="snap-label">${t('snap.employees')}</div><div class="snap-value">${ov.employees}</div></div>`:''}
    ${ov.fiscal_year_end?`<div class="snap-card"><div class="snap-label">${t('snap.fiscal_year_end')}</div><div class="snap-value">${ov.fiscal_year_end}</div></div>`:''}
  </div>
  ${ov.business_model_summary?`<div style="margin-top:14px"><div class="snap-label" style="margin-bottom:6px">${t('snap.biz_model')}</div><div style="font-size:13px;color:var(--text-muted);line-height:1.7">${ov.business_model_summary}</div></div>`:''}
  ${ov.competitive_position?`<div style="margin-top:12px"><div class="snap-label" style="margin-bottom:6px">${t('snap.competitive_pos')}</div><div style="font-size:13px;color:var(--text-muted);line-height:1.6">${ov.competitive_position}</div></div>`:''}
  </div>`;
  const moatHtml=ov.moat_factors?.length?`<div class="ov-section"><div class="ov-title">${t('ov.moat')}</div><div class="moat-list">${ov.moat_factors.map(f=>`<div class="moat-chip">✓ ${f}</div>`).join('')}</div></div>`:'';
  const maxRev=ov.segments?.length?Math.max(...ov.segments.map(s=>s.revenue||0)):1;
  const segHtml=ov.segments?.length?`<div class="ov-section"><div class="ov-title">${t('ov.segments')}</div><div class="seg-layout"><div>
    ${ov.segments.map(s=>{
      const color=SEG_TYPE_COLOR[s.type]||'#8b949e';
      const barPct=s.revenue!=null&&maxRev>0?(s.revenue/maxRev*100).toFixed(1):(s.revenue_pct??0);
      const revAmt=s.revenue!=null?`$${s.revenue}B`:(s.revenue_share||'');
      const revPct=s.revenue_pct!=null?`${s.revenue_pct}%`:'';
      const revLabel=[revAmt,revPct].filter(Boolean).join(' · ');
            const yoyCol=s.yoy_change>0?'var(--green)':s.yoy_change<0?'var(--red)':'var(--text-muted)';
      return `<div class="seg-bar-item">
        <div class="seg-bar-header"><span class="seg-bar-name">${s.name}</span>

async function renderOrgChart(corpStructure){
  const wrap=document.getElementById('org-chart-wrap'); if(!wrap||!corpStructure?.length)return;

  function safeId(str){return 'n'+str.replace(/[^a-zA-Z0-9]/g,'_').substring(0,18);}
  let syntax='flowchart TD\n';
  const parentId=safeId(parent.name);
  syntax+=` ${parentId}["${parent.name}"]\n`;
  (parent.children||[]).forEach(child=>{
    const childId=safeId(child.name);
    const pct=child.ownership_pct!=null?child.ownership_pct+'%':'';
    const partner=child.partner?' | '+child.partner:'';
    syntax+=` ${parentId} --> ${childId}["${child.name} ${pct}${partner}"]\n`;

  try{ const{svg}=await mermaid.render('org-'+Date.now(),syntax); wrap.innerHTML=svg; }
  catch(e){ wrap.innerHTML=`<div class="gantt-loading">${t('error.chart')}</div>`; }
}

/* ── GANTT ── */
function extractEndDate(text,dateSaid){
  const qm=text.match(/Q([1-4])\s+(20\d\d)/);
  if(qm){const em=parseInt(qm[1])*3;return`${qm[2]}-${String(em).padStart(2,'0')}-28`;}
  const ym=text.match(/\b(20\d\d)[-–]?(20\d\d)?\b/);
  if(ym)return`${ym[2]||ym[1]}-12-31`;
  const d=new Date(dateSaid); d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}
function buildGanttSyntax(roadmap){
  const withDate=roadmap.filter(r=>r.date_said&&r.date_said!=='null');
  if(!withDate.length)return null;
  const sorted=[...withDate].sort((a,b)=>new Date(a.date_said)-new Date(b.date_said));
  const sections={delivered:sorted.filter(r=>r.status==='delivered'),monitoring:sorted.filter(r=>r.status==='monitoring'),pending:sorted.filter(r=>r.status==='pending'),partial:sorted.filter(r=>r.status==='partial'),missed:sorted.filter(r=>r.status==='missed')};
  const modifiers={delivered:'done, ',monitoring:'active, ',pending:'',partial:'crit, ',missed:'crit, '};
  const labels={delivered:'Delivered',monitoring:'Monitoring',pending:'Pending',partial:'Partial',missed:'Missed'};
  let syntax=`gantt\n  dateFormat YYYY-MM-DD\n  axisFormat %b %Y\n`;
  let hasContent=false;
  Object.entries(sections).forEach(([status,items])=>{
    if(!items.length)return; hasContent=true;
    syntax+=`  section ${labels[status]}\n`;
    items.forEach((r,i)=>{
      const text=rmText(r);
      const shortText=text.split(' ').slice(0,5).join(' ').replace(/[:#,\[\]"'\\()]/g,'').trim()||'Item';
      const endDate=extractEndDate(text,r.date_said);
      syntax+=`  ${shortText} :${modifiers[status]}rm${status}${i}, ${r.date_said}, ${endDate}\n`;
    });
  });
  return hasContent?syntax:null;
}
async function renderGanttChart(roadmap){
  const container=document.getElementById('gantt-container'); if(!container)return;
  const syntax=buildGanttSyntax(roadmap);
  if(!syntax){container.innerHTML=`<div class="gantt-loading">${t('empty.roadmap')}</div>`;return;}
  const theme=am5isLight()?'default':'dark';
  mermaid.initialize({startOnLoad:false,theme,securityLevel:'loose'});
  try{const{svg}=await mermaid.render('gantt-'+Date.now(),syntax);container.innerHTML=svg;}
  catch(e){container.innerHTML=`<div class="gantt-loading">${t('error.timeline')}</div>`;}
}
