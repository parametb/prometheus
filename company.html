<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prometheus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME (default) ── */
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --green: #3fb950; --red: #f85149;
      --yellow: #d29922; --purple: #bc8cff;
      --glow: rgba(88,166,255,0.05);
      --chart-grid: #21262d; --chart-tick: #8b949e;
    }

    /* ── LIGHT THEME ── */
    html[data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
      --accent: #2563eb; --green: #16a34a; --red: #dc2626;
      --yellow: #d97706; --purple: #7c3aed;
      --glow: rgba(37,99,235,0.04);
      --chart-grid: #e2e8f0; --chart-tick: #64748b;
    }

    /* ── STAGGER ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stagger {
      animation: fadeUp 0.4s ease both;
      animation-delay: calc(var(--i, 0) * 0.06s);
    }

    /* ── BASE ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 100vw;
      background: radial-gradient(circle, var(--glow) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-left  { display: flex; align-items: center; gap: 16px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--text); text-decoration: none; }
    .nav-brand svg { color: var(--accent); }
    .back-btn  { display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .back-btn:hover { color: var(--accent); }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      font-size: 15px;
      height: 32px;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
      width: 32px;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── COMPANY HEADER ── */
    .company-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
    .company-logo-lg {
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--accent);
      display: flex;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      height: 64px;
      justify-content: center;
      letter-spacing: -1px;
      width: 64px;
    }
    .company-info { flex: 1; }
    .company-title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .company-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .meta-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
    .meta-muted { color: var(--text-muted); font-size: 13px; font-family: 'JetBrains Mono', monospace; }
    .company-desc { color: var(--text-muted); font-size: 14px; margin-top: 10px; line-height: 1.6; max-width: 700px; }

    /* ── QUICK STATS ── */
    .quick-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .qs-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .qs-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .qs-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
    .qs-value { font-size: 18px; font-weight: 700; }
    .qs-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 500; padding: 12px 20px; position: relative; transition: color 0.2s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0; }
    .tab-count { background: var(--surface2); border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-left: 6px; padding: 1px 7px; }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── TAG FILTER BAR ── */
    .tag-filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tag-filter-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .tag-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 3px 10px; transition: all 0.15s; }
    .tag-chip:hover { border-color: var(--accent); color: var(--accent); }
    .tag-chip.active { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    html[data-theme="light"] .tag-chip.active { background: rgba(37,99,235,0.1); }
    .tag-chip-clear { background: none; border: none; color: var(--red); cursor: pointer; font-size: 12px; margin-left: auto; padding: 3px 8px; display: none; }
    .tag-chip-clear.visible { display: inline; }
    .tag-filter-empty { font-size: 13px; color: var(--text-muted); padding: 24px; text-align: center; }

    /* ── NOTES TAB ── */
    .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 14px; transition: border-color 0.2s; }
    .note-card:hover { border-color: var(--accent); }
    .note-card.hidden { display: none; }
    .note-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
    .note-title { font-size: 16px; font-weight: 700; }
    .note-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .note-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .note-tag { background: var(--surface2); border: 1px solid transparent; border-radius: 20px; color: var(--text-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 9px; transition: all 0.15s; }
    .note-tag:hover { color: var(--accent); border-color: var(--accent); }
    .note-tag.active { background: rgba(88,166,255,0.15); color: var(--accent); border-color: var(--accent); font-weight: 600; }
    .note-body { color: var(--text-muted); font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
    .note-rating { color: var(--yellow); font-size: 14px; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }

    /* ── QUOTES TAB ── */
    .quote-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 18px 20px; margin-bottom: 14px; }
    .quote-card.hidden { display: none; }
    .quote-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .quote-source { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--accent); }
    .quote-speaker { color: var(--text-muted); font-size: 12px; }
    .quote-date { font-family: 'JetBrains Mono', monospace; color: var(--text-muted); font-size: 12px; margin-left: auto; }
    .quote-text { font-family: 'Instrument Serif', serif; font-size: 16px; line-height: 1.7; font-style: italic; color: var(--text); }
    .quote-text::before { content: '\201C'; font-size: 28px; color: var(--accent); line-height: 0; vertical-align: -9px; margin-right: 4px; }
    .quote-text::after  { content: '\201D'; font-size: 28px; color: var(--accent); line-height: 0; vertical-align: -9px; margin-left: 4px; }
    .quote-tag-link { background: var(--surface2); border: 1px solid transparent; border-radius: 20px; color: var(--text-muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 9px; display: inline-block; margin-top: 10px; transition: all 0.15s; }
    .quote-tag-link:hover { color: var(--accent); border-color: var(--accent); }
    .quote-tag-link.active { background: rgba(88,166,255,0.15); color: var(--accent); border-color: var(--accent); }

    /* ── ROADMAP TAB ── */
    .roadmap-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .rm-filter { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 4px 12px; transition: all 0.2s; }
    .rm-filter:hover, .rm-filter.active { border-color: var(--accent); color: var(--accent); }
    .roadmap-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: start; transition: border-color 0.2s; }
    .roadmap-item:hover { border-color: var(--accent); }
    .rm-status-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .status-delivered { background: var(--green); }
    .status-pending   { background: var(--yellow); }
    .status-missed    { background: var(--red); }
    .status-partial   { background: var(--purple); }
    .status-monitoring{ background: var(--accent); }
    .rm-commitment { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .rm-source { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .rm-followup { background: var(--surface2); border-radius: 8px; font-size: 13px; color: var(--text-muted); padding: 8px 12px; }
    .rm-followup-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 3px; }
    .rm-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .badge-delivered  { background: rgba(63,185,80,0.15);  color: var(--green); }
    .badge-pending    { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .badge-missed     { background: rgba(248,81,73,0.15);  color: var(--red); }
    .badge-partial    { background: rgba(188,140,255,0.15);color: var(--purple); }
    .badge-monitoring { background: rgba(88,166,255,0.15); color: var(--accent); }
    .roadmap-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .rm-sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center; }
    .rm-sum-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 800; margin-bottom: 3px; }
    .rm-sum-label { font-size: 11px; color: var(--text-muted); }

    /* ── MERMAID GANTT ── */
    .gantt-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .gantt-title {
      align-items: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      font-size: 13px;
      font-weight: 600;
      gap: 8px;
      padding: 12px 16px;
      color: var(--text-muted);
    }
    .gantt-body { padding: 16px; overflow-x: auto; }
    .gantt-body svg { max-width: 100%; height: auto; }
    .gantt-loading { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); padding: 20px; text-align: center; }

    /* ── FINANCIALS TAB ── */
    .fin-section { margin-bottom: 28px; }
    .fin-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .fin-table th { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-weight: 600; padding: 10px 14px; text-align: right; }
    .fin-table th:first-child { text-align: left; }
    .fin-table td { border: 1px solid var(--border); padding: 10px 14px; text-align: right; font-family: 'JetBrains Mono', monospace; }
    .fin-table td:first-child { text-align: left; color: var(--text-muted); font-size: 12px; font-family: inherit; }
    .fin-table tr:hover td { background: var(--surface2); }
    .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 14px; height: 260px; }

    /* ── FINANCIAL LINKS ── */
    .fin-links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 4px; }
    .fin-link-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); display: flex; align-items: center; gap: 10px; padding: 12px 14px; text-decoration: none; transition: border-color 0.2s, background 0.2s; }
    .fin-link-card:hover { background: var(--surface); border-color: var(--accent); }
    .fin-link-icon { align-items: center; border-radius: 8px; display: flex; flex-shrink: 0; font-size: 18px; height: 34px; justify-content: center; width: 34px; }
    .fin-link-icon.type-10k    { background: rgba(88,166,255,0.15); }
    .fin-link-icon.type-10q    { background: rgba(63,185,80,0.15); }
    .fin-link-icon.type-annual { background: rgba(210,153,34,0.15); }
    .fin-link-icon.type-other  { background: rgba(139,148,158,0.15); }
    .fin-link-info { flex: 1; min-width: 0; }
    .fin-link-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fin-link-type  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .fin-link-arrow { color: var(--text-muted); font-size: 14px; }

    /* ── MISC ── */
    .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .error { text-align: center; padding: 60px; color: var(--red); }
    .sector-tech     { background: rgba(88,166,255,0.15);  color: #58a6ff; }
    .sector-finance  { background: rgba(63,185,80,0.15);   color: #3fb950; }
    .sector-health   { background: rgba(248,81,73,0.15);   color: #f85149; }
    .sector-energy   { background: rgba(210,153,34,0.15);  color: #d29922; }
    .sector-consumer { background: rgba(188,140,255,0.15); color: #bc8cff; }
    .sector-other    { background: rgba(139,148,158,0.15); color: #8b949e; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-brand" href="index.html">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
        <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/>
      </svg>
      Prometheus
    </a>
    <a class="back-btn" href="index.html">← กลับหน้าหลัก</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">🌙</button>
  </div>
</nav>

<main id="main">
  <div class="loading">กำลังโหลดข้อมูล...</div>
</main>

<script>
  /* ── THEME ── */
  (function initTheme() {
    const saved = localStorage.getItem('prometheus-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-btn').textContent = saved === 'dark' ? '🌙' : '☀️';
  })();

  window.toggleTheme = function() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('prometheus-theme', next);
    document.getElementById('theme-btn').textContent = next === 'dark' ? '🌙' : '☀️';
    // re-render chart if on financials
    if (companyData?.financials) {
      const finPanel = document.getElementById('tab-financials');
      if (finPanel?.classList.contains('active')) {
        setTimeout(() => drawFinChart(companyData.financials), 50);
      }
    }
  };

  /* ── MERMAID INIT ── */
  mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

  /* ── APP STATE ── */
  const params = new URLSearchParams(window.location.search);
  const ticker = params.get('ticker');
  let companyData = null;
  let rmFilter = 'all';
  let activeNoteTag = null;
  let activeQuoteTag = null;

  const SECTOR_CLASS  = { Technology:'sector-tech', Finance:'sector-finance', Healthcare:'sector-health', Energy:'sector-energy', Consumer:'sector-consumer' };
  const STATUS_LABELS = { delivered:'✅ Delivered', pending:'⏳ Pending', missed:'❌ Missed', partial:'⚠️ Partial', monitoring:'👀 Monitoring' };
  const LINK_ICONS    = {
    '10-K':          { icon: '📄', cls: 'type-10k' },
    '10-Q':          { icon: '📋', cls: 'type-10q' },
    'Annual Report': { icon: '📑', cls: 'type-annual' },
    'Proxy Statement':{ icon: '🗳️', cls: 'type-other' },
    'Investor Day':  { icon: '🎤', cls: 'type-other' },
  };

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' });
  }

  /* ── LOAD ── */
  async function loadCompany() {
    if (!ticker) { document.getElementById('main').innerHTML = '<div class="error">ไม่พบ ticker ในลิงก์</div>'; return; }
    try {
      const res = await fetch(`data/${ticker}/data.json`);
      if (!res.ok) throw new Error('not found');
      companyData = await res.json();
      document.title = `${companyData.name} — Prometheus`;
      render();
    } catch(e) {
      document.getElementById('main').innerHTML = `<div class="error">ไม่พบข้อมูล ${ticker}<br><small>ตรวจสอบว่ามีไฟล์ data/${ticker}/data.json</small></div>`;
    }
  }

  /* ── COLLECT TAGS ── */
  function collectTags(items, field) {
    const set = new Set();
    items.forEach(item => {
      const val = item[field];
      if (Array.isArray(val)) val.forEach(t => set.add(t));
      else if (val) set.add(val);
    });
    return [...set].sort();
  }

  /* ── TAG FILTER BAR ── */
  function tagFilterBar(tags, activeTag, onClickFn, clearFn) {
    if (!tags.length) return '';
    const chips = tags.map(t => `
      <button class="tag-chip ${activeTag===t?'active':''}" onclick="${onClickFn}('${t}')">#${t}</button>
    `).join('');
    return `
      <div class="tag-filter-bar">
        <span class="tag-filter-label">tag:</span>
        ${chips}
        <button class="tag-chip-clear ${activeTag?'visible':''}" onclick="${clearFn}()">✕ ล้าง</button>
      </div>`;
  }

  /* ── RENDER ── */
  function render() {
    const c = companyData;
    const sectorClass = SECTOR_CLASS[c.sector] || 'sector-other';
    const notes   = c.notes   || [];
    const quotes  = c.quotes  || [];
    const roadmap = c.roadmap || [];
    const fin     = c.financials || {};

    const rmStats = {
      delivered: roadmap.filter(r=>r.status==='delivered').length,
      pending:   roadmap.filter(r=>r.status==='pending').length,
      missed:    roadmap.filter(r=>r.status==='missed').length,
      partial:   roadmap.filter(r=>r.status==='partial').length,
    };
    const concluded  = rmStats.delivered + rmStats.missed + rmStats.partial;
    const deliveryRate = concluded > 0 ? Math.round((rmStats.delivered / concluded) * 100) : 0;

    document.getElementById('main').innerHTML = `
      <div class="company-header stagger" style="--i:0">
        <div class="company-logo-lg">${ticker.slice(0,3)}</div>
        <div class="company-info">
          <div class="company-title">${c.name}</div>
          <div class="company-meta">
            <span class="meta-tag ${sectorClass}">${c.sector}</span>
            <span class="meta-muted">${ticker} · ${c.exchange || 'NASDAQ'}</span>
            <span class="meta-muted">· อัพเดท ${formatDate(c.last_updated)}</span>
          </div>
          ${c.description ? `<div class="company-desc">${c.description}</div>` : ''}
        </div>
      </div>

      <div class="quick-stats">
        <div class="qs-card stagger" style="--i:1"><div class="qs-label">NOTES</div><div class="qs-value">${notes.length}</div><div class="qs-sub">บันทึกทั้งหมด</div></div>
        <div class="qs-card stagger" style="--i:2"><div class="qs-label">QUOTES</div><div class="qs-value">${quotes.length}</div><div class="qs-sub">จาก Earnings Call</div></div>
        <div class="qs-card stagger" style="--i:3"><div class="qs-label">ROADMAP</div><div class="qs-value">${roadmap.length}</div><div class="qs-sub">สิ่งที่ผู้บริหารพูด</div></div>
        <div class="qs-card stagger" style="--i:4"><div class="qs-label">DELIVERY</div>
          <div class="qs-value" style="color:${deliveryRate>=70?'var(--green)':deliveryRate>=40?'var(--yellow)':'var(--red)'}">${concluded>0?deliveryRate+'%':'—'}</div>
          <div class="qs-sub">${concluded>0?`${concluded} concluded items`:'no concluded items yet'}</div>
        </div>
      </div>

      <div class="tabs stagger" style="--i:5">
        <button class="tab-btn active" onclick="switchTab('notes')">📝 Notes <span class="tab-count">${notes.length}</span></button>
        <button class="tab-btn" onclick="switchTab('quotes')">💬 Quotes <span class="tab-count">${quotes.length}</span></button>
        <button class="tab-btn" onclick="switchTab('roadmap')">🗺️ Roadmap <span class="tab-count">${roadmap.length}</span></button>
        <button class="tab-btn" onclick="switchTab('financials')">📊 Financials</button>
      </div>

      <div class="tab-panel active" id="tab-notes">${renderNotesPanel(notes)}</div>
      <div class="tab-panel" id="tab-quotes">${renderQuotesPanel(quotes)}</div>
      <div class="tab-panel" id="tab-roadmap">${renderRoadmapPanel(roadmap, rmStats)}</div>
      <div class="tab-panel" id="tab-financials">${renderFinancials(fin)}</div>
    `;

    if (fin.metrics && fin.years) setTimeout(() => drawFinChart(fin), 100);
    if (roadmap.length)           setTimeout(() => renderGanttChart(roadmap), 150);
  }

  /* ── NOTES PANEL ── */
  function renderNotesPanel(notes) {
    if (!notes.length) return '<div class="empty">ยังไม่มีบันทึก — เพิ่มใน notes array ของ data.json</div>';
    const allTags = collectTags(notes, 'tags');
    const filterBar = tagFilterBar(allTags, activeNoteTag, 'setNoteTag', 'clearNoteTag');
    const cards = notes.slice().reverse().map((n, i) => {
      const hidden = activeNoteTag && !(n.tags||[]).includes(activeNoteTag) ? 'hidden' : '';
      return `
        <div class="note-card stagger ${hidden}" style="--i:${i}" data-tags='${JSON.stringify(n.tags||[])}'>
          <div class="note-header">
            <div class="note-title">${n.title}</div>
            <div class="note-date">${formatDate(n.date)}</div>
          </div>
          ${(n.tags||[]).length ? `<div class="note-tags">${n.tags.map(t=>`
            <button class="note-tag ${activeNoteTag===t?'active':''}" onclick="setNoteTag('${t}')">#${t}</button>
          `).join('')}</div>` : ''}
          <div class="note-body">${n.content}</div>
          ${n.rating ? `<div class="note-rating">${'★'.repeat(n.rating)}${'☆'.repeat(5-n.rating)} Conviction</div>` : ''}
        </div>`;
    }).join('');
    const emptyMsg = activeNoteTag ? `<div class="tag-filter-empty">ไม่มี Note ที่มี tag #${activeNoteTag}</div>` : '';
    return filterBar + cards + emptyMsg;
  }

  /* ── QUOTES PANEL ── */
  function renderQuotesPanel(quotes) {
    if (!quotes.length) return '<div class="empty">ยังไม่มี quotes — เพิ่มใน quotes array ของ data.json</div>';
    const allTags = collectTags(quotes, 'tag');
    const filterBar = tagFilterBar(allTags, activeQuoteTag, 'setQuoteTag', 'clearQuoteTag');
    const cards = quotes.slice().reverse().map((q, i) => {
      const hidden = activeQuoteTag && q.tag !== activeQuoteTag ? 'hidden' : '';
      return `
        <div class="quote-card stagger ${hidden}" style="--i:${i}">
          <div class="quote-meta">
            <span class="quote-source">${q.source}</span>
            <span class="quote-speaker">— ${q.speaker || 'Management'}</span>
            <span class="quote-date">${formatDate(q.date)}</span>
          </div>
          <div class="quote-text">${q.quote}</div>
          ${q.tag ? `<button class="quote-tag-link ${activeQuoteTag===q.tag?'active':''}" onclick="setQuoteTag('${q.tag}')">#${q.tag}</button>` : ''}
        </div>`;
    }).join('');
    const emptyMsg = activeQuoteTag ? `<div class="tag-filter-empty">ไม่มี Quote ที่มี tag #${activeQuoteTag}</div>` : '';
    return filterBar + cards + emptyMsg;
  }

  /* ── TAG ACTIONS ── */
  window.setNoteTag = function(tag) {
    activeNoteTag = (activeNoteTag === tag) ? null : tag;
    document.getElementById('tab-notes').innerHTML = renderNotesPanel(companyData.notes || []);
  };
  window.clearNoteTag = function() {
    activeNoteTag = null;
    document.getElementById('tab-notes').innerHTML = renderNotesPanel(companyData.notes || []);
  };
  window.setQuoteTag = function(tag) {
    activeQuoteTag = (activeQuoteTag === tag) ? null : tag;
    document.getElementById('tab-quotes').innerHTML = renderQuotesPanel(companyData.quotes || []);
  };
  window.clearQuoteTag = function() {
    activeQuoteTag = null;
    document.getElementById('tab-quotes').innerHTML = renderQuotesPanel(companyData.quotes || []);
  };

  /* ── ROADMAP PANEL ── */
  function renderRoadmapPanel(roadmap, rmStats) {
    return `
      <div class="roadmap-summary">
        <div class="rm-sum-card stagger" style="--i:0"><div class="rm-sum-num" style="color:var(--green)">${rmStats.delivered}</div><div class="rm-sum-label">Delivered ✅</div></div>
        <div class="rm-sum-card stagger" style="--i:1"><div class="rm-sum-num" style="color:var(--yellow)">${rmStats.pending}</div><div class="rm-sum-label">Pending ⏳</div></div>
        <div class="rm-sum-card stagger" style="--i:2"><div class="rm-sum-num" style="color:var(--red)">${rmStats.missed}</div><div class="rm-sum-label">Missed ❌</div></div>
        <div class="rm-sum-card stagger" style="--i:3"><div class="rm-sum-num" style="color:var(--purple)">${rmStats.partial}</div><div class="rm-sum-label">Partial ⚠️</div></div>
      </div>

      <!-- Mermaid Gantt Chart -->
      <div class="gantt-section">
        <div class="gantt-title">📅 Timeline Overview</div>
        <div class="gantt-body" id="gantt-container">
          <div class="gantt-loading">กำลังสร้าง timeline...</div>
        </div>
      </div>

      <div class="roadmap-filters">
        ${['all','delivered','pending','missed','partial','monitoring'].map(f=>`
          <button class="rm-filter ${f==='all'?'active':''}" onclick="filterRoadmap('${f}')">${f==='all'?'ทั้งหมด':STATUS_LABELS[f]}</button>
        `).join('')}
      </div>
      <div id="roadmap-list">${renderRoadmapItems(roadmap)}</div>
    `;
  }

  function renderRoadmapItems(items) {
    const filtered = rmFilter === 'all' ? items : items.filter(r => r.status === rmFilter);
    if (!filtered.length) return '<div class="empty">ไม่มีรายการ</div>';
    return [...filtered].sort((a,b)=>new Date(b.date_said)-new Date(a.date_said)).map((r, i) => `
      <div class="roadmap-item stagger" style="--i:${i}">
        <div class="rm-status-dot status-${r.status}"></div>
        <div>
          <div class="rm-commitment">${r.commitment}</div>
          <div class="rm-source">📅 พูดเมื่อ ${formatDate(r.date_said)} · ${r.source}</div>
          ${r.follow_up ? `<div class="rm-followup"><div class="rm-followup-label">ผลลัพธ์ (${formatDate(r.follow_up_date)})</div>${r.follow_up}</div>` : ''}
        </div>
        <span class="rm-badge badge-${r.status}">${STATUS_LABELS[r.status]||r.status}</span>
      </div>`).join('');
  }

  window.filterRoadmap = function(f) {
    rmFilter = f;
    document.querySelectorAll('.rm-filter').forEach(b => {
      const label = b.textContent.trim();
      b.classList.toggle('active', f==='all' ? label==='ทั้งหมด' : label.includes(f));
    });
    document.getElementById('roadmap-list').innerHTML = renderRoadmapItems(companyData.roadmap||[]);
  };

  /* ── MERMAID GANTT ── */
  function extractEndDate(text, dateSaid) {
    const qm = text.match(/Q([1-4])\s+(20\d\d)/);
    if (qm) {
      const endMonth = parseInt(qm[1]) * 3;
      return `${qm[2]}-${String(endMonth).padStart(2,'0')}-28`;
    }
    const ym = text.match(/\b(20\d\d)[-–]?(20\d\d)?\b/);
    if (ym) return `${ym[2]||ym[1]}-12-31`;
    const d = new Date(dateSaid);
    d.setFullYear(d.getFullYear() + 1);
    return d.toISOString().split('T')[0];
  }

  function buildGanttSyntax(roadmap) {
    const theme = document.documentElement.getAttribute('data-theme');
    const sorted = [...roadmap].sort((a,b) => new Date(a.date_said) - new Date(b.date_said));
    const sections = {
      delivered:  sorted.filter(r => r.status === 'delivered'),
      monitoring: sorted.filter(r => r.status === 'monitoring'),
      pending:    sorted.filter(r => r.status === 'pending'),
      partial:    sorted.filter(r => r.status === 'partial'),
      missed:     sorted.filter(r => r.status === 'missed'),
    };
    const modifiers = { delivered:'done, ', monitoring:'active, ', pending:'', partial:'crit, ', missed:'crit, ' };
    const sectionLabels = { delivered:'✅ Delivered', monitoring:'👀 Monitoring', pending:'⏳ Pending', partial:'⚠️ Partial', missed:'❌ Missed' };

    let syntax = `gantt\n    dateFormat  YYYY-MM-DD\n    axisFormat  %b %Y\n`;
    let hasContent = false;

    Object.entries(sections).forEach(([status, items]) => {
      if (!items.length) return;
      hasContent = true;
      syntax += `    section ${sectionLabels[status]}\n`;
      items.forEach((r, i) => {
        const shortText = r.commitment.split(' ').slice(0, 6).join(' ').replace(/[:#]/g, '') + '...';
        const endDate   = extractEndDate(r.commitment, r.date_said);
        const modifier  = modifiers[status];
        syntax += `    ${shortText} :${modifier}rm${status}${i}, ${r.date_said}, ${endDate}\n`;
      });
    });

    return hasContent ? syntax : null;
  }

  async function renderGanttChart(roadmap) {
    const container = document.getElementById('gantt-container');
    if (!container) return;
    const syntax = buildGanttSyntax(roadmap);
    if (!syntax) { container.innerHTML = '<div class="gantt-loading">ไม่มีข้อมูล roadmap</div>'; return; }

    const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
    mermaid.initialize({ startOnLoad: false, theme, securityLevel: 'loose' });

    try {
      const id = 'gantt-' + Date.now();
      const { svg } = await mermaid.render(id, syntax);
      container.innerHTML = svg;
    } catch(e) {
      container.innerHTML = '<div class="gantt-loading">ไม่สามารถแสดง timeline ได้</div>';
    }
  }

  /* ── FINANCIALS ── */
  function renderFinancials(fin) {
    if (!fin || !fin.metrics || !fin.metrics.length) {
      return '<div class="empty">ยังไม่มีข้อมูลทางการเงิน — เพิ่มใน financials ของ data.json</div>';
    }
    const years    = fin.years    || [];
    const currency = fin.currency || 'USD';
    const unit     = fin.unit     || 'Million';
    const linksHtml = renderFinLinks(fin.links || []);
    return `
      ${linksHtml}
      <div class="fin-section">
        <div class="fin-title">📈 แนวโน้ม Revenue</div>
        <div class="chart-container"><canvas id="fin-chart"></canvas></div>
      </div>
      <div class="fin-section">
        <div class="fin-title">📋 ตารางข้อมูลทางการเงิน (${currency}, ${unit})</div>
        <div style="overflow-x:auto">
          <table class="fin-table">
            <thead>
              <tr><th>Metric</th>${years.map(y=>`<th>${y}</th>`).join('')}</tr>
            </thead>
            <tbody>
              ${fin.metrics.map(m => `
                <tr>
                  <td>${m.name}</td>
                  ${m.values.map((v,i) => {
                    const prev = m.values[i-1];
                    const change = prev!=null ? ((v-prev)/Math.abs(prev)*100).toFixed(1) : null;
                    const color = change>0 ? 'var(--green)' : change<0 ? 'var(--red)' : '';
                    return `<td>${v.toLocaleString()}${change!=null?`<br><small style="color:${color};font-family:'JetBrains Mono',monospace">${change>0?'+':''}${change}%</small>`:''}</td>`;
                  }).join('')}
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      ${fin.notes ? `<div class="fin-section"><div class="fin-title">📝 หมายเหตุ</div><div style="color:var(--text-muted);font-size:13px;line-height:1.6">${fin.notes}</div></div>` : ''}
    `;
  }

  function renderFinLinks(links) {
    if (!links || !links.length) return '';
    const cards = links.map(lk => {
      const info  = LINK_ICONS[lk.type] || { icon: '🔗', cls: 'type-other' };
      const label = [lk.type, lk.year, lk.quarter].filter(Boolean).join(' ');
      return `
        <a class="fin-link-card" href="${lk.url}" target="_blank" rel="noopener">
          <div class="fin-link-icon ${info.cls}">${info.icon}</div>
          <div class="fin-link-info">
            <div class="fin-link-title">${lk.title}</div>
            <div class="fin-link-type">${label}</div>
          </div>
          <span class="fin-link-arrow">↗</span>
        </a>`;
    }).join('');
    return `
      <div class="fin-section">
        <div class="fin-title">🔗 เอกสารทางการ</div>
        <div class="fin-links-grid">${cards}</div>
      </div>`;
  }

  let finChartInstance = null;
  function drawFinChart(fin) {
    const ctx = document.getElementById('fin-chart');
    if (!ctx) return;
    if (finChartInstance) { finChartInstance.destroy(); finChartInstance = null; }
    const revenueMetric = fin.metrics.find(m => m.name.toLowerCase().includes('revenue') || m.name.toLowerCase().includes('รายได้'));
    if (!revenueMetric) return;
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const gridColor = isLight ? '#e2e8f0' : '#21262d';
    const tickColor = isLight ? '#64748b' : '#8b949e';
    const barColor  = isLight ? 'rgba(37,99,235,0.2)'  : 'rgba(88,166,255,0.25)';
    const borderCol = isLight ? '#2563eb' : '#58a6ff';
    finChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: fin.years,
        datasets: [{
          label: revenueMetric.name, data: revenueMetric.values,
          backgroundColor: barColor, borderColor: borderCol,
          borderWidth: 2, borderRadius: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: tickColor } } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: tickColor } },
          y: { grid: { color: gridColor }, ticks: { color: tickColor } }
        }
      }
    });
  }

  /* ── TAB SWITCH ── */
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const tabs = ['notes','quotes','roadmap','financials'];
    document.querySelectorAll('.tab-btn')[tabs.indexOf(tab)]?.classList.add('active');
    document.getElementById(`tab-${tab}`)?.classList.add('active');
    if (tab === 'financials' && companyData?.financials) {
      setTimeout(() => drawFinChart(companyData.financials), 50);
    }
    if (tab === 'roadmap' && companyData?.roadmap?.length) {
      setTimeout(() => renderGanttChart(companyData.roadmap), 50);
    }
  };

  loadCompany();
</script>
</body>
</html>
