<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prometheus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/xy.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/percent.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Dark.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --green: #3fb950; --red: #f85149;
      --yellow: #d29922; --purple: #bc8cff;
      --glow: rgba(88,166,255,0.05);
    }
    html[data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
      --accent: #2563eb; --green: #16a34a; --red: #dc2626;
      --yellow: #d97706; --purple: #7c3aed;
      --glow: rgba(37,99,235,0.04);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stagger { animation: fadeUp 0.4s ease both; animation-delay: calc(var(--i,0)*0.06s); }

    body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height: 100vh; position: relative; }
    body::before { content:''; position:fixed; top:-30%; left:50%; transform:translateX(-50%); width:100vw; height:100vw; background:radial-gradient(circle,var(--glow) 0%,transparent 65%); pointer-events:none; z-index:0; }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

    /* NAV */
    nav { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
    .nav-left  { display:flex; align-items:center; gap:16px; }
    .nav-right { display:flex; align-items:center; gap:12px; }
    .nav-brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:17px; color:var(--text); text-decoration:none; }
    .nav-brand svg { color:var(--accent); }
    .back-btn  { display:flex; align-items:center; gap:6px; color:var(--text-muted); text-decoration:none; font-size:14px; transition:color 0.2s; }
    .back-btn:hover { color:var(--accent); }
    .theme-toggle { align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); cursor:pointer; display:flex; font-size:15px; height:32px; justify-content:center; transition:border-color 0.2s,color 0.2s; width:32px; }
    .theme-toggle:hover { border-color:var(--accent); color:var(--accent); }

    /* COMPANY HEADER */
    .company-header { display:flex; align-items:flex-start; gap:20px; margin-bottom:28px; flex-wrap:wrap; }
    .company-logo-lg { align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:14px; color:var(--accent); display:flex; flex-shrink:0; font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:800; height:64px; justify-content:center; letter-spacing:-1px; width:64px; }
    .company-info { flex:1; }
    .company-title { font-size:26px; font-weight:800; margin-bottom:4px; }
    .company-meta  { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .meta-tag      { font-size:12px; padding:3px 10px; border-radius:20px; }
    .meta-muted    { color:var(--text-muted); font-size:13px; font-family:'JetBrains Mono',monospace; }
    .company-desc  { color:var(--text-muted); font-size:14px; margin-top:10px; line-height:1.6; max-width:700px; }

    /* QUICK STATS */
    .quick-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:28px; }
    .qs-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; transition:border-color 0.2s,transform 0.2s; }
    .qs-card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .qs-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); margin-bottom:5px; }
    .qs-value { font-size:18px; font-weight:700; }
    .qs-sub   { font-size:11px; color:var(--text-muted); margin-top:3px; }

    /* TABS */
    .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:24px; overflow-x:auto; }
    .tab-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; font-weight:500; padding:12px 18px; position:relative; transition:color 0.2s; white-space:nowrap; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--accent); }
    .tab-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
    .tab-count { background:var(--surface2); border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:11px; margin-left:6px; padding:1px 7px; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* TAG FILTER */
    .tag-filter-bar { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .tag-filter-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); white-space:nowrap; }
    .tag-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:12px; padding:3px 10px; transition:all 0.15s; }
    .tag-chip:hover { border-color:var(--accent); color:var(--accent); }
    .tag-chip.active { background:rgba(88,166,255,0.15); border-color:var(--accent); color:var(--accent); font-weight:600; }
    html[data-theme="light"] .tag-chip.active { background:rgba(37,99,235,0.1); }
    .tag-chip-clear { background:none; border:none; color:var(--red); cursor:pointer; font-size:12px; margin-left:auto; padding:3px 8px; display:none; }
    .tag-chip-clear.visible { display:inline; }
    .tag-filter-empty { font-size:13px; color:var(--text-muted); padding:24px; text-align:center; }

    /* NOTES */
    .note-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:14px; transition:border-color 0.2s; }
    .note-card:hover { border-color:var(--accent); }
    .note-card.hidden { display:none; }
    .note-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:10px; flex-wrap:wrap; }
    .note-title { font-size:16px; font-weight:700; }
    .note-date  { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); white-space:nowrap; }
    .note-tags  { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .note-tag   { background:var(--surface2); border:1px solid transparent; border-radius:20px; color:var(--text-muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 9px; transition:all 0.15s; }
    .note-tag:hover { color:var(--accent); border-color:var(--accent); }
    .note-tag.active { background:rgba(88,166,255,0.15); color:var(--accent); border-color:var(--accent); font-weight:600; }
    .note-body   { color:var(--text-muted); font-size:14px; line-height:1.7; white-space:pre-wrap; }
    .note-rating { color:var(--yellow); font-size:14px; margin-top:10px; font-family:'JetBrains Mono',monospace; }

    /* QUOTES */
    .quote-card { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; padding:18px 20px; margin-bottom:14px; }
    .quote-card.hidden { display:none; }
    .quote-meta   { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
    .quote-source { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:var(--accent); }
    .quote-speaker{ color:var(--text-muted); font-size:12px; }
    .quote-date   { font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:12px; margin-left:auto; }
    .quote-text   { font-family:'Instrument Serif',serif; font-size:16px; line-height:1.7; font-style:italic; color:var(--text); }
    .quote-text::before { content:'\201C'; font-size:28px; color:var(--accent); line-height:0; vertical-align:-9px; margin-right:4px; }
    .quote-text::after  { content:'\201D'; font-size:28px; color:var(--accent); line-height:0; vertical-align:-9px; margin-left:4px; }
    .quote-th       { color:var(--text-muted); font-size:13px; line-height:1.6; margin-top:10px; padding:10px 14px; background:var(--surface2); border-radius:8px; border-left:2px solid var(--border); }
    .quote-th-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); opacity:0.7; margin-bottom:4px; }
    .quote-tag-link { background:var(--surface2); border:1px solid transparent; border-radius:20px; color:var(--text-muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 9px; display:inline-block; margin-top:10px; transition:all 0.15s; }
    .quote-tag-link:hover { color:var(--accent); border-color:var(--accent); }
    .quote-tag-link.active { background:rgba(88,166,255,0.15); color:var(--accent); border-color:var(--accent); }

    /* ROADMAP */
    .roadmap-filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .rm-filter { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-size:12px; padding:4px 12px; transition:all 0.2s; }
    .rm-filter:hover,.rm-filter.active { border-color:var(--accent); color:var(--accent); }
    .roadmap-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 20px; margin-bottom:12px; display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:start; transition:border-color 0.2s; }
    .roadmap-item:hover { border-color:var(--accent); }
    .rm-status-dot { width:10px; height:10px; border-radius:50%; margin-top:5px; flex-shrink:0; }
    .status-delivered  { background:var(--green); }
    .status-pending    { background:var(--yellow); }
    .status-missed     { background:var(--red); }
    .status-partial    { background:var(--purple); }
    .status-monitoring { background:var(--accent); }
    .rm-commitment { font-size:14px; font-weight:600; margin-bottom:6px; }
    .rm-source { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); margin-bottom:8px; }
    .rm-followup { background:var(--surface2); border-radius:8px; font-size:13px; color:var(--text-muted); padding:8px 12px; }
    .rm-followup-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); font-weight:600; margin-bottom:3px; }
    .rm-badge { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; white-space:nowrap; }
    .badge-delivered  { background:rgba(63,185,80,0.15);   color:var(--green); }
    .badge-pending    { background:rgba(210,153,34,0.15);  color:var(--yellow); }
    .badge-missed     { background:rgba(248,81,73,0.15);   color:var(--red); }
    .badge-partial    { background:rgba(188,140,255,0.15); color:var(--purple); }
    .badge-monitoring { background:rgba(88,166,255,0.15);  color:var(--accent); }
    .roadmap-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
    .rm-sum-card  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; text-align:center; }
    .rm-sum-num   { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:800; margin-bottom:3px; }
    .rm-sum-label { font-size:11px; color:var(--text-muted); }

    /* GANTT */
    .gantt-section { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:20px; overflow:hidden; }
    .gantt-title   { align-items:center; border-bottom:1px solid var(--border); display:flex; font-size:13px; font-weight:600; gap:8px; padding:12px 16px; color:var(--text-muted); }
    .gantt-body    { padding:16px; overflow-x:auto; }
    .gantt-body svg { max-width:100%; height:auto; }
    .gantt-loading { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); padding:20px; text-align:center; }

    /* FINANCIALS */
    .fin-section { margin-bottom:28px; }
    .fin-title   { font-size:16px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .fin-table   { width:100%; border-collapse:collapse; font-size:13px; }
    .fin-table th { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-weight:600; padding:10px 14px; text-align:right; }
    .fin-table th:first-child { text-align:left; }
    .fin-table td { border:1px solid var(--border); padding:10px 14px; text-align:right; font-family:'JetBrains Mono',monospace; }
    .fin-table td:first-child { text-align:left; color:var(--text-muted); font-size:12px; font-family:inherit; }
    .fin-table tr:hover td { background:var(--surface2); }
    .chart-container  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 20px 20px; margin-bottom:14px; }
    .fin-metric-bar   { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .fin-metric-btn   { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-size:12px; padding:4px 12px; transition:all 0.18s; white-space:nowrap; }
    .fin-metric-btn:hover  { border-color:var(--accent); color:var(--accent); }
    .fin-metric-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    #fin-chart { height:240px; width:100%; }
    .sankey-container { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px; margin-bottom:20px; height:460px; }
    .fin-links-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-bottom:4px; }
    .fin-link-card  { background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); display:flex; align-items:center; gap:10px; padding:12px 14px; text-decoration:none; transition:border-color 0.2s,background 0.2s; }
    .fin-link-card:hover { background:var(--surface); border-color:var(--accent); }
    .fin-link-icon  { align-items:center; border-radius:8px; display:flex; flex-shrink:0; font-size:18px; height:34px; justify-content:center; width:34px; }
    .fin-link-icon.type-10k    { background:rgba(88,166,255,0.15); }
    .fin-link-icon.type-10q    { background:rgba(63,185,80,0.15); }
    .fin-link-icon.type-annual { background:rgba(210,153,34,0.15); }
    .fin-link-icon.type-other  { background:rgba(139,148,158,0.15); }
    .fin-link-info  { flex:1; min-width:0; }
    .fin-link-title { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fin-link-type  { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); margin-top:2px; }
    .fin-link-arrow { color:var(--text-muted); font-size:14px; }

    /* OVERVIEW TAB */
    .ov-section { margin-bottom:32px; }
    .ov-title   { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; padding-bottom:10px; border-bottom:1px solid var(--border); }
    .snapshot-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .snap-card  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .snap-label { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); margin-bottom:6px; }
    .snap-value { font-size:14px; font-weight:600; line-height:1.4; }
    .moat-list  { display:flex; flex-wrap:wrap; gap:8px; }
    .moat-chip  { background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-size:13px; padding:6px 12px; line-height:1.4; }

    /* SEGMENTS */
    .seg-layout { display:grid; grid-template-columns:1fr 200px; gap:20px; align-items:start; }
    @media(max-width:640px){ .seg-layout { grid-template-columns:1fr; } }
    .seg-bar-item   { margin-bottom:14px; }
    .seg-bar-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; font-size:13px; }
    .seg-bar-name   { font-weight:600; }
    .seg-bar-nums   { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); }
    .seg-bar-track  { background:var(--surface2); border-radius:4px; height:8px; overflow:hidden; }
    .seg-bar-fill   { height:100%; border-radius:4px; width:0; transition:width 0.8s ease; }
    .seg-bar-assets { font-size:11px; color:var(--text-muted); margin-top:4px; }
    .seg-donut-wrap { display:flex; flex-direction:column; align-items:center; }
    .seg-donut-canvas { width:180px; height:180px; }

    /* GEO */
    .geo-item   { margin-bottom:12px; }
    .geo-header { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
    .geo-track  { background:var(--surface2); border-radius:4px; height:6px; overflow:hidden; }
    .geo-fill   { height:100%; border-radius:4px; background:var(--accent); width:0; transition:width 0.8s ease; }

    /* TIMELINE */
    .tl-filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .tl-filter  { background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-muted); cursor:pointer; font-size:12px; padding:4px 12px; transition:all 0.2s; }
    .tl-filter:hover,.tl-filter.active { border-color:var(--accent); color:var(--accent); }
    .timeline-wrap { position:relative; padding-left:28px; }
    .timeline-wrap::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:var(--border); }
    .tl-item { position:relative; margin-bottom:20px; }
    .tl-item.hidden { display:none; }
    .tl-dot  { position:absolute; left:-24px; top:4px; width:12px; height:12px; border-radius:50%; border:2px solid var(--bg); }
    .tl-year { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); font-weight:700; margin-bottom:3px; }
    .tl-evtitle { font-size:14px; font-weight:700; margin-bottom:4px; }
    .tl-desc { font-size:13px; color:var(--text-muted); line-height:1.5; }

    /* MANAGEMENT */
    .mgmt-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
    .mgmt-card  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; transition:border-color 0.2s; }
    .mgmt-card:hover { border-color:var(--accent); }
    .mgmt-name  { font-size:15px; font-weight:700; margin-bottom:2px; }
    .mgmt-title { font-size:12px; color:var(--accent); font-family:'JetBrains Mono',monospace; margin-bottom:6px; }
    .mgmt-since { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; margin-bottom:8px; }
    .mgmt-bio   { font-size:13px; color:var(--text-muted); line-height:1.5; }

    /* THESIS */
    .thesis-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:640px){ .thesis-grid { grid-template-columns:1fr; } }
    .thesis-card  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; }
    .thesis-label { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; margin-bottom:10px; }
    .thesis-label.bull { color:var(--green); }
    .thesis-label.bear { color:var(--red); }
    .thesis-text  { font-size:13px; color:var(--text-muted); line-height:1.6; }

    /* RISKS */
    .risk-item   { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:10px; cursor:pointer; transition:border-color 0.2s; }
    .risk-item:hover { border-color:var(--accent); }
    .risk-header { display:flex; align-items:center; gap:10px; }
    .risk-severity { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .sev-high   { background:rgba(248,81,73,0.15);  color:var(--red); }
    .sev-medium { background:rgba(210,153,34,0.15); color:var(--yellow); }
    .sev-low    { background:rgba(63,185,80,0.15);  color:var(--green); }
    .risk-name   { font-size:14px; font-weight:600; flex:1; }
    .risk-toggle { color:var(--text-muted); font-size:12px; }
    .risk-body   { display:none; padding-top:12px; }
    .risk-body.open { display:block; }

/* ── THEME ── */
(function initTheme() {

window.toggleTheme = function() {

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' });
}

async function loadCompany() {
  if (!ticker) { document.getElementById('main').innerHTML = '<div class="error">ไม่พบ ticker ในลิงก์</div>'; return; }
  try {

    document.getElementById('main').innerHTML = `<div class="error">ไม่พบข้อมูล ${ticker}<br><small>ตรวจสอบว่ามีไฟล์ data/${ticker}/data.json</small></div>`;
  }
}

function collectTags(items, field) {
  const set = new Set();
  items.forEach(item => {
    const val = item[field];
    if (Array.isArray(val)) val.forEach(t => set.add(t));
    else if (val) set.add(val);
  });
  return [...set].sort();
}

function tagFilterBar(tags, activeTag, onClickFn, clearFn) {
  if (!tags.length) return '';
  const chips = tags.map(t => `<button class="tag-chip ${activeTag===t?'active':''}" onclick="${onClickFn}('${t}')">#${t}</button>`).join('');
  return `<div class="tag-filter-bar"><span class="tag-filter-label">แท็ก:</span>${chips}<button class="tag-chip-clear ${activeTag?'visible':''}" onclick="${clearFn}()">✕ ล้าง</button></div>`;
}

/* ── Segment / Geo enrichment ──────────────────────────────────────────────
   JSON stores revenue_share as a human-readable string (e.g. "~88% (FY2026)")
   and geographies.share as "~45%".  These helpers parse them into numbers so
   the bar-chart / donut rendering code gets clean revenue_pct + revenue values.
   Revenue in $B is derived from EDGAR financials when available.              */

function parsePct(str) {
  if (str == null) return null;
  const s = String(str).replace(/,/g, '');
  const isLessThan = s.includes('<');
  const m = s.match(/(\d+(?:\.\d+)?)\s*%/);
  if (!m) return null;
  const v = parseFloat(m[1]);
  // "<1%" → treat as 0.5 (midpoint of 0-1 range)
  return isLessThan ? Math.round(v * 0.5 * 10) / 10 : v;
}

function enrichSegments(segs) {
  // Get latest non-null total revenue (in $B) from EDGAR financials
  let totalRevB = null;
  const fin = companyData?.financials;
  if (fin?.metrics && fin?.years) {
    const rm = fin.metrics.find(m => m.name === 'Revenue');
    if (rm) {
      for (let i = rm.values.length - 1; i >= 0; i--) {
        if (rm.values[i] != null) {
          // EDGAR stores in Millions → convert to Billions
          totalRevB = Math.round(rm.values[i] / 100) / 10;
          break;
        }
      }
    }
  }
  return segs.map(s => {
    if (s.revenue != null && s.revenue_pct != null) return s; // already numeric
    const pct = s.revenue_pct ?? parsePct(s.revenue_share);
    const rev = (totalRevB != null && pct != null)
      ? Math.round(totalRevB * pct / 100 * 10) / 10
      : s.revenue ?? null;
    return { ...s, revenue_pct: pct, revenue: rev };
  });
}

function enrichGeos(geos) {
  return geos.map(g => {
    if (g.revenue_pct != null) return g;
    return { ...g, revenue_pct: parsePct(g.share ?? g.revenue_share) };
  });
}

    <div class="tab-panel" id="tab-quotes">${renderQuotesPanel(quotes)}</div>

  if (ov?.ownership?.corporate_structure?.length) setTimeout(() => renderOrgChart(ov.ownership.corporate_structure), 250);

/* ── OVERVIEW PANEL ── */

    const ni  = (fin.metrics||[]).find(m=>m.name==='Net Income');
    const latestRev = rev?.values?.slice(-1)[0];
    const latestNI  = ni?.values?.slice(-1)[0];

function am5isLight() { return document.documentElement.getAttribute('data-theme') === 'light'; }
function am5MakeRoot(id) {
  const root = am5.Root.new(id);
  const themes = [am5themes_Animated.new(root)];

/* ── SEGMENT DONUT (amCharts 5) ── */
let segDonutRoot = null;
function drawSegmentDonut(segments) {
  const el = document.getElementById('seg-donut');

  if (segDonutRoot) { segDonutRoot.dispose(); segDonutRoot = null; }

  segDonutRoot = root;

  const chart = root.container.children.push(am5percent.PieChart.new(root, {
    innerRadius: am5.percent(62), layout: root.horizontalLayout,
    paddingTop: 0, paddingBottom: 0, paddingLeft: 0, paddingRight: 0
  }));
  const series = chart.series.push(am5percent.PieSeries.new(root, {
    valueField: 'pct', categoryField: 'name',

  }));

  });

}

/* ── ORG CHART (Mermaid) ── */
async function renderOrgChart(corpStructure) {
  const wrap = document.getElementById('org-chart-wrap');
  if (!wrap || !corpStructure?.length) return;
  const parent = corpStructure[0];
  if (!parent) return;

  function safeId(str) { return 'n' + str.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 18); }

  let syntax = 'flowchart TD\n';
  const parentId = safeId(parent.name);
  syntax += `    ${parentId}["${parent.name}"]\n`;

  (parent.children || []).forEach(child => {
    const childId = safeId(child.name);
    const pct = child.ownership_pct != null ? child.ownership_pct + '%' : '';
    const partner = child.partner ? ' | ' + child.partner : '';
    syntax += `    ${parentId} --> ${childId}["${child.name} ${pct}${partner}"]\n`;
  });

  const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
  mermaid.initialize({ startOnLoad: false, theme, securityLevel: 'loose' });
  try {
    const { svg } = await mermaid.render('org-' + Date.now(), syntax);
    wrap.innerHTML = svg;
  } catch(e) {
    wrap.innerHTML = '<div class="gantt-loading">ไม่สามารถแสดงแผนผังได้</div>';
  }
}

/* ── MERMAID GANTT ── */
function extractEndDate(text, dateSaid) {
  const qm = text.match(/Q([1-4])\s+(20\d\d)/);
  if (qm) { const em = parseInt(qm[1])*3; return `${qm[2]}-${String(em).padStart(2,'0')}-28`; }
  const ym = text.match(/\b(20\d\d)[-–]?(20\d\d)?\b/);
  if (ym) return `${ym[2]||ym[1]}-12-31`;
  const d = new Date(dateSaid); d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}

function buildGanttSyntax(roadmap) {
  /* Only include items that have a valid date_said — null dates break Mermaid */
  const withDate = roadmap.filter(r => r.date_said && r.date_said !== 'null');
  if (!withDate.length) return null;
  const sorted = [...withDate].sort((a,b)=>new Date(a.date_said)-new Date(b.date_said));
  const sections  = { delivered:sorted.filter(r=>r.status==='delivered'), monitoring:sorted.filter(r=>r.status==='monitoring'), pending:sorted.filter(r=>r.status==='pending'), partial:sorted.filter(r=>r.status==='partial'), missed:sorted.filter(r=>r.status==='missed') };
  const modifiers = { delivered:'done, ', monitoring:'active, ', pending:'', partial:'crit, ', missed:'crit, ' };
  const labels    = { delivered:'Delivered', monitoring:'Monitoring', pending:'Pending', partial:'Partial', missed:'Missed' };
  let syntax = `gantt\n    dateFormat  YYYY-MM-DD\n    axisFormat  %b %Y\n`;
  let hasContent = false;
  Object.entries(sections).forEach(([status, items]) => {
    if (!items.length) return;
    hasContent = true;
    syntax += `    section ${labels[status]}\n`;
    items.forEach((r, i) => {
      /* Escape chars that break Mermaid 10.x Gantt parser */
      const text = rmText(r);
      const shortText = text.split(' ').slice(0,5).join(' ').replace(/[:#,\[\]"'\\()/]/g,'').trim() || 'Item';
      const endDate = extractEndDate(text, r.date_said);
      syntax += `    ${shortText} :${modifiers[status]}rm${status}${i}, ${r.date_said}, ${endDate}\n`;
    });
  });
  return hasContent ? syntax : null;
}

async function renderGanttChart(roadmap) {
  const container = document.getElementById('gantt-container');
  if (!container) return;
  const syntax = buildGanttSyntax(roadmap);
  if (!syntax) { container.innerHTML = '<div class="gantt-loading">ไม่มีข้อมูล roadmap</div>'; return; }
  const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark';
  mermaid.initialize({ startOnLoad:false, theme, securityLevel:'loose' });
  try {
    const { svg } = await mermaid.render('gantt-'+Date.now(), syntax);
    container.innerHTML = svg;
  } catch(e) {
    container.innerHTML = '<div class="gantt-loading">ไม่สามารถแสดง timeline ได้</div>';
  }
}

/* ── SANKEY (Plotly) ── */
function drawSankeyChart(fin) {
  const el = document.getElementById('sankey-chart');
  if (!el || !fin.breakdown?.sankey) return;
  const sk = fin.breakdown.sankey;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const bg   = isLight ? '#ffffff' : '#161b22';
  const fc   = isLight ? '#0f172a' : '#e6edf3';
  Plotly.newPlot(el, [{
    type: 'sankey',
    orientation: 'h',
    node: {
      pad: 15, thickness: 20,
      line: { color: isLight?'#e2e8f0':'#30363d', width: 0.5 },
      label: sk.nodes.map(n=>n.label),
      color: sk.nodes.map(n=>n.color),
    },
    link: {
      source: sk.links.map(l=>l.source),
      target: sk.links.map(l=>l.target),
      value:  sk.links.map(l=>l.value),
      color:  sk.links.map(l=>(sk.nodes[l.source]?.color||'#888')+'55'),
    }
  }], {
    paper_bgcolor: bg, plot_bgcolor: bg,
    font: { size:11, color:fc, family:"'JetBrains Mono',monospace" },
    margin: { l:10, r:10, t:10, b:10 },
  }, { responsive:true, displayModeBar:false });
}

/* ── FIN CHART ── */
/* ── FINANCIAL CHART (amCharts 5) — multi-metric selector ── */
let finChartRoot = null;
let _finData = null; // cache for metric switching

function drawFinChart(fin) {
  if (!fin.metrics?.length || !fin.years?.length) return;
  _finData = fin;

  // Build metric selector buttons
  const bar = document.getElementById('fin-metric-bar');
  if (bar) {
    bar.innerHTML = fin.metrics.map((m, i) =>
      `<button class="fin-metric-btn${i===0?' active':''}" onclick="switchFinMetric(${i})">${m.name}</button>`
    ).join('');
  }

  renderFinMetric(0);
}

function switchFinMetric(idx) {
  document.querySelectorAll('.fin-metric-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderFinMetric(idx);
}

function renderFinMetric(idx) {
  const fin = _finData;
  if (!fin) return;
  const el = document.getElementById('fin-chart');
  if (!el) return;

  if (finChartRoot) { finChartRoot.dispose(); finChartRoot = null; }

  const metric = fin.metric || fin.metrics[idx];
  const values = fin.metrics[idx].values;
  const name   = fin.metrics[idx].name;
  const isLight = am5isLight();

  const root = am5MakeRoot('fin-chart');
  finChartRoot = root;

  // Custom colors
  root.interfaceColors.set('grid', am5.color(isLight ? '#e2e8f0' : '#21262d'));

  const chart = root.container.children.push(am5xy.XYChart.new(root, {
    panX: false, panY: false, wheelX: 'none', wheelY: 'none',
    paddingLeft: 0, paddingRight: 8, paddingBottom: 0
  }));

  // X axis
  const xRenderer = am5xy.AxisRendererX.new(root, { minGridDistance: 30 });
  xRenderer.labels.template.setAll({ fill: am5.color(isLight ? '#64748b' : '#8b949e'), fontSize: 12 });
  xRenderer.grid.template.set('stroke', am5.color(isLight ? '#e2e8f0' : '#21262d'));
  const xAxis = chart.xAxes.push(am5xy.CategoryAxis.new(root, {
    categoryField: 'year', renderer: xRenderer,
    tooltip: am5.Tooltip.new(root, {})
  }));

  // Y axis
  const yRenderer = am5xy.AxisRendererY.new(root, {});
  yRenderer.labels.template.setAll({ fill: am5.color(isLight ? '#64748b' : '#8b949e'), fontSize: 11 });
  yRenderer.grid.template.set('stroke', am5.color(isLight ? '#e2e8f0' : '#21262d'));
  const yAxis = chart.yAxes.push(am5xy.ValueAxis.new(root, { renderer: yRenderer }));

  // Accent color
  const accentHex = isLight ? '#2563eb' : '#58a6ff';
  const accentColor = am5.color(accentHex);

  // Column series
  const series = chart.series.push(am5xy.ColumnSeries.new(root, {
    name: name, xAxis, yAxis,
    valueYField: 'value', categoryXField: 'year',
    tooltip: am5.Tooltip.new(root, {
      labelText: `{categoryX}  {valueY}\n{yoy}`
    })
  }));
  series.columns.template.setAll({
    cornerRadiusTL: 4, cornerRadiusTR: 4,
    fill: accentColor, stroke: accentColor, fillOpacity: isLight ? 0.25 : 0.3,
    strokeWidth: 2, width: am5.percent(60)
  });
  series.columns.template.adapters.add('fillOpacity', (v, target) =>
    target.dataItem?.dataContext?.highlight ? 0.85 : (isLight ? 0.25 : 0.30)
  );

  // Line overlay
  const lineSeries = chart.series.push(am5xy.LineSeries.new(root, {
    name, xAxis, yAxis, valueYField: 'value', categoryXField: 'year'
  }));
  lineSeries.strokes.template.setAll({ stroke: accentColor, strokeWidth: 2 });
  lineSeries.bullets.push(() => am5.Bullet.new(root, {
    sprite: am5.Circle.new(root, { radius: 4, fill: accentColor, stroke: root.interfaceColors.get('background'), strokeWidth: 2 })
  }));

  // Build data with YoY
  const data = fin.years.map((y, i) => {
    const v = values[i];
    const prev = values[i-1];
    const yoy = (v != null && prev != null && prev !== 0)
      ? ((v - prev) / Math.abs(prev) * 100).toFixed(1)
      : null;
    const yoyStr = yoy != null ? (yoy > 0 ? `+${yoy}%` : `${yoy}%`) : '';
    return { year: String(y), value: v ?? null, yoy: yoyStr, highlight: i === fin.years.length - 1 };
  });

  xAxis.data.setAll(data);
  series.data.setAll(data);
  lineSeries.data.setAll(data);

  chart.appear(800, 50);
  series.appear(800, 100);
}

/* ── TRADINGVIEW WIDGETS ── */
function injectTVWidget(containerId, scriptSrc, config) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'tradingview-widget-container';
  wrap.style.cssText = 'height:100%;width:100%';
  const wdiv = document.createElement('div');
  wdiv.className = 'tradingview-widget-container__widget';
  wdiv.style.cssText = 'height:calc(100% - 28px);width:100%';
  wrap.appendChild(wdiv);
  const copy = document.createElement('div');
  copy.style.cssText = 'font-size:10px;padding:4px 8px;color:var(--text-muted)';
  copy.innerHTML = 'ข้อมูลโดย <a href="https://www.tradingview.com/" rel="noopener nofollow" target="_blank" style="color:var(--accent)">TradingView</a>';
  wrap.appendChild(copy);
  const script = document.createElement('script');
  script.type = 'text/javascript';
  script.src = scriptSrc;
  script.async = true;
  script.textContent = JSON.stringify(config);
  wrap.appendChild(script);
  container.appendChild(wrap);
}

function renderTVChart(symbol) {
  if (!symbol || !document.getElementById('tv-chart-outer')) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  injectTVWidget('tv-chart-outer',
    'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js',
    {
      allow_symbol_change: true,
      calendar: false,
      details: false,
      hide_side_toolbar: true,
      hide_top_toolbar: false,
      hide_legend: false,
      hide_volume: false,
      hotlist: false,
      interval: 'D',
      locale: 'en',
      save_image: true,
      style: '1',
      symbol: symbol,
      theme: isLight ? 'light' : 'dark',
      timezone: 'Etc/UTC',
      backgroundColor: isLight ? '#ffffff' : '#0d1117',
      gridColor: isLight ? 'rgba(0,0,0,0.05)' : 'rgba(242,242,242,0.06)',
      watchlist: [],
      withdateranges: true,
      compareSymbols: [],
      studies: [],
      autosize: true
    }
  );
}

function renderTVFundamentals(symbol) {
  if (!symbol || !document.getElementById('tv-fundamentals-outer')) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  injectTVWidget('tv-fundamentals-outer',
    'https://s3.tradingview.com/external-embedding/embed-widget-financials.js',
    {
      symbol: symbol,
      colorTheme: isLight ? 'light' : 'dark',
      displayMode: 'regular',
      isTransparent: true,
      locale: 'en',
      width: '100%',
      height: 530
    }
  );
}

/* ── TAB SWITCH ── */
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[TAB_ORDER.indexOf(tab)]?.classList.add('active');
  document.getElementById('tab-'+tab)?.classList.add('active');
  if (tab==='financials' && companyData?.financials) {
    setTimeout(()=>{ drawFinChart(companyData.financials); drawSankeyChart(companyData.financials); }, 50);
  }
  if (tab==='roadmap' && companyData?.roadmap?.length) {
    setTimeout(()=>renderGanttChart(companyData.roadmap), 50);
  }
  if (tab==='overview' && companyData?.overview) {
    setTimeout(()=>{
      drawSegmentDonut(companyData.overview.segments||[]);
      drawOwnershipDonut(companyData.overview.ownership?.major_shareholders||[]);
      animateBars();
      renderTVChart(companyData.tradingview_symbol);
    }, 50);
  }
  if (tab==='financials') {
    setTimeout(()=>renderTVFundamentals(companyData?.tradingview_symbol), 150);
  }
};
