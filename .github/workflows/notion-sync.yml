name: Notion Sync + Quartz Build

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        type: boolean
        default: false
      skip_sync:
        description: 'Skip Notion sync (build Quartz only)'
        type: boolean
        default: false
      skip_edgar:
        description: 'Skip EDGAR financial sync'
        type: boolean
        default: false

concurrency:
  group: notion-sync
  cancel-in-progress: true

jobs:
  sync-and-generate:
    name: Sync Notion → Generate Quartz
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Run EDGAR financial sync
        if: ${{ !inputs.skip_sync && !inputs.skip_edgar }}
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_COMPANIES_DB:  ${{ secrets.NOTION_COMPANIES_DB }}
          NOTION_FINANCIALS_DB: ${{ secrets.NOTION_FINANCIALS_DB }}
          DEBUG:                ${{ inputs.debug }}
        run: node edgar-sync.js

      - name: Run Notion sync
        if: ${{ !inputs.skip_sync }}
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_COMPANIES_DB:  ${{ secrets.NOTION_COMPANIES_DB }}
          NOTION_NOTES_DB:      ${{ secrets.NOTION_NOTES_DB }}
          NOTION_QUOTES_DB:     ${{ secrets.NOTION_QUOTES_DB }}
          NOTION_ROADMAP_DB:    ${{ secrets.NOTION_ROADMAP_DB }}
          NOTION_SOURCES_DB:    ${{ secrets.NOTION_SOURCES_DB }}
          NOTION_REPORTS_DB:    ${{ secrets.NOTION_REPORTS_DB }}
          NOTION_TASKS_DB:      ${{ secrets.NOTION_TASKS_DB }}
          NOTION_FINANCIALS_DB: ${{ secrets.NOTION_FINANCIALS_DB }}
          DEBUG:                ${{ inputs.debug }}
        run: node notion-sync.js

      - run: node generate-quartz.js

      - name: Commit data + quartz content
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ quartz/content/
          git diff --staged --quiet || git commit -m "chore: sync Notion → data + quartz [skip ci]"
          git push

  build-and-deploy:
    name: Build + Deploy to Pages
    needs: sync-and-generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Quartz
        working-directory: quartz
        run: npm ci
      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build
      - name: Assemble site
        run: |
          mkdir -p _site/research
          cp index.html company.html i18n.js _site/
          cp -r data/ _site/data/
          cp -r quartz/public/. _site/research/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
