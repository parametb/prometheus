name: DeepSeek — Investment Thesis Update

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol (e.g. GOOGL)'
        required: true
      force_update:
        description: 'Force update even if thesis was updated recently'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  thesis-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate thesis update
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COMPANIES_DB: ${{ secrets.NOTION_COMPANIES_DB }}
          NOTION_QUOTES_DB: ${{ secrets.NOTION_QUOTES_DB }}
          NOTION_ROADMAP_DB: ${{ secrets.NOTION_ROADMAP_DB }}
          NOTION_NOTES_DB: ${{ secrets.NOTION_NOTES_DB }}
          NOTION_REPORTS_DB: ${{ secrets.NOTION_REPORTS_DB }}
          NOTION_SOURCES_DB: ${{ secrets.NOTION_SOURCES_DB }}
          TICKER: ${{ github.event.inputs.ticker }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update || 'false' }}
        run: node scripts/deepseek-thesis.js --ticker "$TICKER" --force "$FORCE_UPDATE"
