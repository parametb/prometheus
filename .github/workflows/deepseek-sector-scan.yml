name: DeepSeek — Sector Scan

on:
  workflow_dispatch:
    inputs:
      sector:
        description: 'Sector to scan'
        required: true
        default: 'Technology'
        type: choice
        options:
          - Technology
          - Healthcare
          - Finance
          - Energy
          - Consumer
          - Industrials
          - Real Estate
          - All Watchlist
      note_type:
        description: 'Note type to create'
        required: false
        default: 'Observation'
        type: choice
        options:
          - Observation
          - Analysis
          - Risk

  schedule:
    # Run every Monday at 07:00 UTC (14:00 Bangkok time)
    - cron: '0 7 * * 1'

jobs:
  sector-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run sector scan
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COMPANIES_DB: ${{ secrets.NOTION_COMPANIES_DB }}
          NOTION_NOTES_DB: ${{ secrets.NOTION_NOTES_DB }}
          NOTION_SOURCES_DB: ${{ secrets.NOTION_SOURCES_DB }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SECTOR: ${{ github.event.inputs.sector || 'Technology' }}
          NOTE_TYPE: ${{ github.event.inputs.note_type || 'Observation' }}
        run: node scripts/deepseek-sector-scan.js --sector "$SECTOR" --note-type "$NOTE_TYPE"
